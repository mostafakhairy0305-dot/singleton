---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
includes:
  skipfiles:
    taskfile: ../internal/skipfiles/Taskfile.yml
    internal: true
vars:
  ZIZMOR_LINT_SKIP_PATTERN: ""
  ZIZMOR_EXTRA_ARGS: "--offline"
  ZIZMOR_TARGETS: ".github"
  ZIZMOR_VERSION: "1.25.2"
tasks:
  default:
    run: once
    desc: Show available zizmor automation tasks
    summary: Display the list of available zizmor-related tasks defined in this Taskfile.
    cmds:
      - task --list
  lint:
    run: once
    desc: Audit GitHub Actions workflows for security issues
    summary: |
      Run zizmor against ZIZMOR_TARGETS (default: .github) to detect security
      issues in GitHub Actions workflows and composite actions such as
      expression injection, excessive permissions, and dangerous patterns.
      Runs offline by default (no GitHub token required); override with
      ZIZMOR_EXTRA_ARGS="--gh-token $TOKEN" for online checks. Pass
      ZIZMOR_EXTRA_ARGS for additional flags such as --format or
      --min-severity, or CLI arguments after -- to override targets and options.
      ZIZMOR_LINT_SKIP_PATTERN remains active. Auto-installs zizmor if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: |
          skip_pattern='{{if .ZIZMOR_LINT_SKIP_PATTERN_OVERRIDE}}{{.ZIZMOR_LINT_SKIP_PATTERN_OVERRIDE}}
          {{- else}}{{.ZIZMOR_LINT_SKIP_PATTERN}}{{end}}'
          if [ -z "$skip_pattern" ]; then
            env -u GH_TOKEN zizmor \
              {{if .CLI_ARGS}}{{.CLI_ARGS}} \
              {{else}}{{if .ZIZMOR_EXTRA_ARGS_OVERRIDE}}{{.ZIZMOR_EXTRA_ARGS_OVERRIDE}}
              {{- else}}{{.ZIZMOR_EXTRA_ARGS}}{{end}} \
              {{if .ZIZMOR_TARGETS_OVERRIDE}}{{.ZIZMOR_TARGETS_OVERRIDE}}
              {{- else}}{{.ZIZMOR_TARGETS}}{{end}}{{end}} \
              && echo "✅ zizmor audit passed" || { echo "❌ zizmor audit found issues"; exit 1; }
            exit
          fi
          file_list="$(mktemp)"
          trap 'rm -f "$file_list"' EXIT
          for target in {{if .ZIZMOR_TARGETS_OVERRIDE}}{{.ZIZMOR_TARGETS_OVERRIDE}}
          {{- else}}{{.ZIZMOR_TARGETS}}{{end}}; do
            if [ -d "$target" ]; then
              find "$target" -type f \( -name '*.yml' -o -name '*.yaml' \) -print0
            elif [ -f "$target" ]; then
              printf '%s\000' "$target"
            fi
          done | task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
            filter "SKIPFILES_PATTERN=$skip_pattern" >"$file_list"
          if [ ! -s "$file_list" ]; then
            echo "✅ zizmor audit passed (no matching workflows found)"
            exit 0
          fi
          xargs -0 env -u GH_TOKEN zizmor \
            {{if .ZIZMOR_EXTRA_ARGS_OVERRIDE}}{{.ZIZMOR_EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.ZIZMOR_EXTRA_ARGS}}{{end}} \
            {{.CLI_ARGS}} <"$file_list" \
            && echo "✅ zizmor audit passed" || { echo "❌ zizmor audit found issues"; exit 1; }
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item Env:GH_TOKEN -ErrorAction SilentlyContinue; $skipPattern='{{if .ZIZMOR_LINT_SKIP_PATTERN_OVERRIDE}}{{.ZIZMOR_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.ZIZMOR_LINT_SKIP_PATTERN}}{{end}}'; if (-not $skipPattern) {

            zizmor {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}
              {{if .ZIZMOR_EXTRA_ARGS_OVERRIDE}}{{.ZIZMOR_EXTRA_ARGS_OVERRIDE}}
              {{- else}}{{.ZIZMOR_EXTRA_ARGS}}{{end}}
              {{if .ZIZMOR_TARGETS_OVERRIDE}}{{.ZIZMOR_TARGETS_OVERRIDE}}
              {{- else}}{{.ZIZMOR_TARGETS}}{{end}}{{end}};
            exit $LASTEXITCODE
          }; $targets='{{if .ZIZMOR_TARGETS_OVERRIDE}}{{.ZIZMOR_TARGETS_OVERRIDE}} {{- else}}{{.ZIZMOR_TARGETS}}{{end}}'; $files=@($targets.Split(' ') | ForEach-Object {

            if (Test-Path -LiteralPath $_ -PathType Container) {
              Get-ChildItem -LiteralPath $_ -Recurse -File |
                Where-Object { $_.Extension -in @('.yml', '.yaml') }
            } elseif (Test-Path -LiteralPath $_ -PathType Leaf) { Get-Item -LiteralPath $_ }
          }); $paths=@($files | ForEach-Object FullName |

            task --silent --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
              filter ('SKIPFILES_PATTERN=' + $skipPattern));
          if (-not $paths) { Write-Host 'No matching workflows found'; exit 0 }; zizmor

            {{if .ZIZMOR_EXTRA_ARGS_OVERRIDE}}{{.ZIZMOR_EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.ZIZMOR_EXTRA_ARGS}}{{end}}
            {{.CLI_ARGS}} @paths;
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; Write-Host '✅ zizmor audit passed'"
        platforms: [windows]
  install:
    run: once
    desc: Install zizmor on the current operating system
    summary: |
      Download and install the pinned ZIZMOR_VERSION binary for the current
      platform into /usr/local/bin (macOS and Linux) or %USERPROFILE%\bin
      (Windows). The install is skipped automatically when zizmor is already
      present in PATH.
    cmds:
      - task: _install:macos
      - task: _install:linux
      - task: _install:windows
  install:undo:
    run: once
    desc: Remove zizmor from the current operating system
    summary: |
      Remove the zizmor binary from /usr/local/bin on macOS and Linux, or
      from %USERPROFILE%\bin on Windows.
    aliases:
      - uninstall
    prompt:
      - This will remove zizmor from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows
  upgrade:
    run: once
    desc: Upgrade zizmor to the pinned ZIZMOR_VERSION
    summary: |
      Re-download and install the ZIZMOR_VERSION binary, replacing any existing
      installation. Update ZIZMOR_VERSION in the Taskfile vars to change the
      target release.
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows
  version:
    run: once
    desc: Show the installed zizmor version
    summary: Print the active zizmor version via zizmor --version. Auto-installs zizmor if missing.
    deps:
      - install
    cmds:
      - zizmor --version
  _install:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    vars:
      ZIZMOR_UNAME_ARCH:
        sh: uname -m
      ZIZMOR_TRIPLE: >-
        {{if or (eq .ZIZMOR_UNAME_ARCH "arm64") (eq .ZIZMOR_UNAME_ARCH "aarch64")}}aarch64-apple-darwin {{- else}}x86_64-apple-darwin{{end}}
      ZIZMOR_ARCHIVE: "/tmp/taskotter-zizmor-{{.ZIZMOR_VERSION}}.tar.gz"
      ZIZMOR_TMP_DIR: "/tmp/taskotter-zizmor-{{.ZIZMOR_VERSION}}"
    status:
      - >-
        command -v zizmor >/dev/null 2>&1 && zizmor --version | grep -Fq "{{.ZIZMOR_VERSION}}"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download zizmor.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract zizmor.
      - sh: command -v install >/dev/null 2>&1
        msg: install is required to place the zizmor binary.
    cmds:
      - echo 'Installing zizmor v{{.ZIZMOR_VERSION}} for macOS...'
      - mkdir -p "{{.ZIZMOR_TMP_DIR}}"
      - >-
        curl -fsSL -o "{{.ZIZMOR_ARCHIVE}}" "https://github.com/woodruffw/zizmor/releases/download/v{{.ZIZMOR_VERSION}}/zizmor-{{.ZIZMOR_TRIPLE}}.tar.gz"
      - tar -xzf "{{.ZIZMOR_ARCHIVE}}" -C "{{.ZIZMOR_TMP_DIR}}"
      - cmd: >-
          install -m 0755 "$(find "{{.ZIZMOR_TMP_DIR}}" -type f -name zizmor -print -quit)" /usr/local/bin/zizmor
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: >-
          sudo install -m 0755 "$(find "{{.ZIZMOR_TMP_DIR}}" -type f -name zizmor -print -quit)" /usr/local/bin/zizmor
        if: '[ "$(id -u)" -ne 0 ]'
      - rm -rf "{{.ZIZMOR_ARCHIVE}}" "{{.ZIZMOR_TMP_DIR}}"
      - echo 'zizmor installed.'
  _install:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      ZIZMOR_UNAME_ARCH:
        sh: uname -m
      ZIZMOR_TRIPLE: >-
        {{if or (eq .ZIZMOR_UNAME_ARCH "x86_64") (eq .ZIZMOR_UNAME_ARCH "amd64")}}x86_64-unknown-linux-gnu {{- else if or (eq .ZIZMOR_UNAME_ARCH "aarch64") (eq .ZIZMOR_UNAME_ARCH "arm64")}}aarch64-unknown-linux-gnu {{- else}}{{.ZIZMOR_UNAME_ARCH}}{{end}}
      ZIZMOR_ARCHIVE: "/tmp/taskotter-zizmor-{{.ZIZMOR_VERSION}}.tar.gz"
      ZIZMOR_TMP_DIR: "/tmp/taskotter-zizmor-{{.ZIZMOR_VERSION}}"
    status:
      - >-
        command -v zizmor >/dev/null 2>&1 && zizmor --version | grep -Fq "{{.ZIZMOR_VERSION}}"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download zizmor.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract zizmor.
      - sh: command -v install >/dev/null 2>&1
        msg: install is required to place the zizmor binary.
      - sh: >-
          [ "{{.ZIZMOR_TRIPLE}}" = "x86_64-unknown-linux-gnu" ] || [ "{{.ZIZMOR_TRIPLE}}" = "aarch64-unknown-linux-gnu" ]
        msg: Unsupported Linux architecture. Only x86_64 and aarch64 are supported.
    cmds:
      - echo 'Installing zizmor v{{.ZIZMOR_VERSION}} for Linux...'
      - mkdir -p "{{.ZIZMOR_TMP_DIR}}"
      - >-
        curl -fsSL -o "{{.ZIZMOR_ARCHIVE}}" "https://github.com/woodruffw/zizmor/releases/download/v{{.ZIZMOR_VERSION}}/zizmor-{{.ZIZMOR_TRIPLE}}.tar.gz"
      - tar -xzf "{{.ZIZMOR_ARCHIVE}}" -C "{{.ZIZMOR_TMP_DIR}}"
      - cmd: >-
          install -m 0755 "$(find "{{.ZIZMOR_TMP_DIR}}" -type f -name zizmor -print -quit)" /usr/local/bin/zizmor
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: >-
          sudo install -m 0755 "$(find "{{.ZIZMOR_TMP_DIR}}" -type f -name zizmor -print -quit)" /usr/local/bin/zizmor
        if: '[ "$(id -u)" -ne 0 ]'
      - rm -rf "{{.ZIZMOR_ARCHIVE}}" "{{.ZIZMOR_TMP_DIR}}"
      - echo 'zizmor installed.'
  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    vars:
      ZIZMOR_BIN_DIR: '{{env "USERPROFILE"}}\bin'
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$zizmor = Get-Command zizmor -ErrorAction SilentlyContinue; if ($zizmor -and ((& $zizmor.Source --version) -like '*{{.ZIZMOR_VERSION}}*')) { exit 0 }; exit 1"
    cmds:
      - echo Installing zizmor v{{.ZIZMOR_VERSION}} for Windows...
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '$env:USERPROFILE\bin' | Out-Null"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}') | Out-Null"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri ('https://github.com/woodruffw/zizmor/releases/download/v{{.ZIZMOR_VERSION}}' +'/zizmor-x86_64-pc-windows-msvc.zip') -OutFile (Join-Path $env:TEMP 'taskotter-zizmor.zip')"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Expand-Archive -Path (Join-Path $env:TEMP 'taskotter-zizmor.zip') -DestinationPath (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}') -Force"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Copy-Item (Get-ChildItem -Path (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}') -Recurse -Filter 'zizmor.exe' | Select-Object -First 1 -ExpandProperty FullName) '$env:USERPROFILE\bin\zizmor.exe' -Force"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}'), (Join-Path $env:TEMP 'taskotter-zizmor.zip') -Recurse -Force -ErrorAction SilentlyContinue"
      - echo zizmor installed. Ensure %USERPROFILE%\bin is in your PATH.
  _install:undo:unix:
    run: once
    internal: true
    platforms: [darwin, linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v zizmor >/dev/null 2>&1"
    cmds:
      - echo 'Removing zizmor...'
      - cmd: rm -f /usr/local/bin/zizmor
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo rm -f /usr/local/bin/zizmor
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'zizmor removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - echo Removing zizmor...
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item '$env:USERPROFILE\bin\zizmor.exe' -Force -ErrorAction SilentlyContinue"
      - echo zizmor removed.
  _upgrade:unix:
    run: once
    internal: true
    platforms: [darwin, linux]
    set: [errexit, nounset, pipefail]
    vars:
      ZIZMOR_UNAME_ARCH:
        sh: uname -m
      ZIZMOR_OS:
        sh: uname -s
      ZIZMOR_TRIPLE: >-
        {{if eq .ZIZMOR_OS "Darwin"}}

          {{if or (eq .ZIZMOR_UNAME_ARCH "arm64") (eq .ZIZMOR_UNAME_ARCH "aarch64")}}aarch64-apple-darwin
          {{- else}}x86_64-apple-darwin{{end}}
        {{- else}}

          {{if or (eq .ZIZMOR_UNAME_ARCH "aarch64") (eq .ZIZMOR_UNAME_ARCH "arm64")}}aarch64-unknown-linux-gnu
          {{- else}}x86_64-unknown-linux-gnu{{end}}
        {{- end}}
      ZIZMOR_ARCHIVE: "/tmp/taskotter-zizmor-{{.ZIZMOR_VERSION}}.tar.gz"
      ZIZMOR_TMP_DIR: "/tmp/taskotter-zizmor-{{.ZIZMOR_VERSION}}"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download zizmor.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract zizmor.
    cmds:
      - echo 'Upgrading zizmor to v{{.ZIZMOR_VERSION}}...'
      - mkdir -p "{{.ZIZMOR_TMP_DIR}}"
      - >-
        curl -fsSL -o "{{.ZIZMOR_ARCHIVE}}" "https://github.com/woodruffw/zizmor/releases/download/v{{.ZIZMOR_VERSION}}/zizmor-{{.ZIZMOR_TRIPLE}}.tar.gz"
      - tar -xzf "{{.ZIZMOR_ARCHIVE}}" -C "{{.ZIZMOR_TMP_DIR}}"
      - cmd: >-
          install -m 0755 "$(find "{{.ZIZMOR_TMP_DIR}}" -type f -name zizmor -print -quit)" /usr/local/bin/zizmor
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: >-
          sudo install -m 0755 "$(find "{{.ZIZMOR_TMP_DIR}}" -type f -name zizmor -print -quit)" /usr/local/bin/zizmor
        if: '[ "$(id -u)" -ne 0 ]'
      - rm -rf "{{.ZIZMOR_ARCHIVE}}" "{{.ZIZMOR_TMP_DIR}}"
      - echo 'zizmor upgraded.'
  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - echo Upgrading zizmor to v{{.ZIZMOR_VERSION}} for Windows...
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '$env:USERPROFILE\bin' | Out-Null"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}') | Out-Null"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri ('https://github.com/woodruffw/zizmor/releases/download/v{{.ZIZMOR_VERSION}}' +'/zizmor-x86_64-pc-windows-msvc.zip') -OutFile (Join-Path $env:TEMP 'taskotter-zizmor.zip')"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Expand-Archive -Path (Join-Path $env:TEMP 'taskotter-zizmor.zip') -DestinationPath (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}') -Force"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Copy-Item (Get-ChildItem -Path (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}') -Recurse -Filter 'zizmor.exe' | Select-Object -First 1 -ExpandProperty FullName) '$env:USERPROFILE\bin\zizmor.exe' -Force"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item (Join-Path $env:TEMP 'taskotter-zizmor-{{.ZIZMOR_VERSION}}'), (Join-Path $env:TEMP 'taskotter-zizmor.zip') -Recurse -Force -ErrorAction SilentlyContinue"
      - echo zizmor upgraded.

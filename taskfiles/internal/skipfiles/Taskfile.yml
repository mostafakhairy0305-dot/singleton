---
version: "3"
silent: true
tasks:
  filter:
    dir: "{{.USER_WORKING_DIR}}"
    set: [errexit, nounset, pipefail]
    env:
      SKIPFILES_PATTERN: '{{default "" .SKIPFILES_PATTERN}}'
      SKIPFILES_MATCHING: '{{default "false" .SKIPFILES_MATCHING}}'
      SKIPFILES_FILTER_COMMAND: |
        pattern="${SKIPFILES_PATTERN-}"

        glob_to_regex() {
          local glob="${1//\\//}"
          local regex="^"
          local index=0
          local length=${#glob}
          local char next

          while ((index < length)); do
            char="${glob:index:1}"
            next=""
            if ((index + 1 < length)); then
              next="${glob:index+1:1}"
            fi

            case "$char" in
              '*')
                if [[ "$next" == '*' ]]; then
                  if ((index + 2 < length)) && [[ "${glob:index+2:1}" == '/' ]]; then
                    regex+='(.*/)?'
                    ((index += 3))
                    continue
                  fi
                  regex+='.*'
                  ((index += 2))
                  continue
                fi
                regex+='[^/]*'
                ;;
              '?') regex+='[^/]' ;;
              '.'|'+'|'('|')'|'['|']'|'{'|'}'|'^'|'$'|'|') regex+="\\$char" ;;
              '\\') regex+='/' ;;
              *) regex+="$char" ;;
            esac
            ((index += 1))
          done

          printf '%s$' "$regex"
        }

        regex="$(glob_to_regex "$pattern")"
        working_dir="$(pwd -P)"

        while IFS= read -r -d '' path; do
          normalized="${path//\\//}"
          normalized="${normalized#./}"
          if [[ "$normalized" == "$working_dir/"* ]]; then
            normalized="${normalized#"$working_dir/"}"
          fi

          matched=false
          if [[ -n "$pattern" && "$normalized" =~ $regex ]]; then
            matched=true
          fi

          if [[ "$SKIPFILES_MATCHING" == "true" && "$matched" == true ]]; then
            printf '%s\0' "$path"
          elif [[ "$SKIPFILES_MATCHING" != "true" && "$matched" == false ]]; then
            printf '%s\0' "$path"
          fi
        done
    cmds:
      - cmd: bash -c "$SKIPFILES_FILTER_COMMAND"
        platforms: [linux, darwin]
      - cmd: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command '
            $ErrorActionPreference = "Stop"
            $pattern = $env:SKIPFILES_PATTERN
            $matching = $env:SKIPFILES_MATCHING -eq "true"
            $escapedPattern = $pattern.Replace("\", "/")
            $builder = [System.Text.StringBuilder]::new("^")

            for ($index = 0; $index -lt $escapedPattern.Length; $index++) {
              $character = $escapedPattern[$index]
              if ($character -eq "*") {
                if (($index + 1) -lt $escapedPattern.Length -and $escapedPattern[$index + 1] -eq "*") {
                  if (($index + 2) -lt $escapedPattern.Length -and $escapedPattern[$index + 2] -eq "/") {
                    [void]$builder.Append("(?:.*/)?")
                    $index += 2
                  } else {
                    [void]$builder.Append(".*")
                    $index += 1
                  }
                } else {
                  [void]$builder.Append("[^/]*")
                }
              } elseif ($character -eq "?") {
                [void]$builder.Append("[^/]")
              } else {
                [void]$builder.Append([regex]::Escape([string]$character))
              }
            }

            [void]$builder.Append("$")
            $matcher = [regex]::new($builder.ToString())
            $workingDirectory = (Get-Location).Path.Replace("\", "/").TrimEnd("/")
            $inputText = [Console]::In.ReadToEnd()

            foreach ($item in ($inputText -split "`r?`n")) {
              if ([string]::IsNullOrWhiteSpace($item)) { continue }
              $normalized = $item.Replace("\", "/")
              if ($normalized.StartsWith("./")) { $normalized = $normalized.Substring(2) }
              if ($normalized.StartsWith($workingDirectory + "/", [System.StringComparison]::OrdinalIgnoreCase)) {
                $normalized = $normalized.Substring($workingDirectory.Length + 1)
              }
              $isMatch = -not [string]::IsNullOrEmpty($pattern) -and $matcher.IsMatch($normalized)
              if (($matching -and $isMatch) -or (-not $matching -and -not $isMatch)) {
                [Console]::Out.WriteLine($item)
              }
            }
          '
        platforms: [windows]
  go-packages:
    dir: "{{.USER_WORKING_DIR}}"
    env:
      SKIPFILES_PATTERN: '{{default "" .SKIPFILES_PATTERN}}'
      SKIPFILES_GO_TARGETS: '{{default "./..." .SKIPFILES_GO_TARGETS}}'
      SKIPFILES_GO_PACKAGES_COMMAND: |
        set -euo pipefail

        pattern="${SKIPFILES_PATTERN-}"
        targets="${SKIPFILES_GO_TARGETS:-./...}"

        glob_to_regex() {
          local glob="${1//\\//}"
          local regex="^"
          local index=0
          local length=${#glob}
          local char next

          while ((index < length)); do
            char="${glob:index:1}"
            next=""
            if ((index + 1 < length)); then
              next="${glob:index+1:1}"
            fi

            case "$char" in
              '*')
                if [[ "$next" == '*' ]]; then
                  if ((index + 2 < length)) && [[ "${glob:index+2:1}" == '/' ]]; then
                    regex+='(.*/)?'
                    ((index += 3))
                    continue
                  fi
                  regex+='.*'
                  ((index += 2))
                  continue
                fi
                regex+='[^/]*'
                ;;
              '?') regex+='[^/]' ;;
              '.'|'+'|'('|')'|'['|']'|'{'|'}'|'^'|'$'|'|') regex+="\\$char" ;;
              '\\') regex+='/' ;;
              *) regex+="$char" ;;
            esac
            ((index += 1))
          done

          printf '%s$' "$regex"
        }

        left_braces='{'
        left_braces="${left_braces}{"
        right_braces='}'
        right_braces="${right_braces}}"
        go_template="${left_braces}.ImportPath${right_braces}"
        go_template+="${left_braces}\"\\t\"${right_braces}"
        go_template+="${left_braces}range .GoFiles${right_braces}"
        go_template+="${left_braces}\$.Dir${right_braces}/${left_braces}.${right_braces}"
        go_template+="${left_braces}\"\\t\"${right_braces}${left_braces}end${right_braces}"
        go_template+="${left_braces}range .CgoFiles${right_braces}"
        go_template+="${left_braces}\$.Dir${right_braces}/${left_braces}.${right_braces}"
        go_template+="${left_braces}\"\\t\"${right_braces}${left_braces}end${right_braces}"
        go_template+="${left_braces}range .TestGoFiles${right_braces}"
        go_template+="${left_braces}\$.Dir${right_braces}/${left_braces}.${right_braces}"
        go_template+="${left_braces}\"\\t\"${right_braces}${left_braces}end${right_braces}"
        go_template+="${left_braces}range .XTestGoFiles${right_braces}"
        go_template+="${left_braces}\$.Dir${right_braces}/${left_braces}.${right_braces}"
        go_template+="${left_braces}\"\\t\"${right_braces}${left_braces}end${right_braces}"

        regex="$(glob_to_regex "$pattern")"
        working_dir="$(pwd -P)"

        go list -f "$go_template" $targets |
          while IFS=$'\t' read -r import_path file_paths; do
            matched=false
            old_ifs="$IFS"
            IFS=$'\t'
            for path in $file_paths; do
              normalized="${path//\\//}"
              if [[ "$normalized" == "$working_dir/"* ]]; then
                normalized="${normalized#"$working_dir/"}"
              fi
              normalized="${normalized#./}"
              if [[ -n "$pattern" && "$normalized" =~ $regex ]]; then
                matched=true
                break
              fi
            done
            IFS="$old_ifs"

            if [[ "$matched" == false ]]; then
              printf '%s\0' "$import_path"
            fi
          done
    cmds:
      - cmd: bash -c "$SKIPFILES_GO_PACKAGES_COMMAND"
        platforms: [linux, darwin]
      - cmd: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command '
            $ErrorActionPreference = "Stop"
            $pattern = $env:SKIPFILES_PATTERN.Replace("\", "/")
            $targets = @($env:SKIPFILES_GO_TARGETS.Split(
              " ", [System.StringSplitOptions]::RemoveEmptyEntries
            ))
            if (-not $targets) { $targets = @("./...") }

            $builder = [System.Text.StringBuilder]::new("^")
            for ($index = 0; $index -lt $pattern.Length; $index++) {
              $character = $pattern[$index]
              if ($character -eq "*") {
                if (($index + 1) -lt $pattern.Length -and $pattern[$index + 1] -eq "*") {
                  if (($index + 2) -lt $pattern.Length -and $pattern[$index + 2] -eq "/") {
                    [void]$builder.Append("(?:.*/)?")
                    $index += 2
                  } else {
                    [void]$builder.Append(".*")
                    $index += 1
                  }
                } else {
                  [void]$builder.Append("[^/]*")
                }
              } elseif ($character -eq "?") {
                [void]$builder.Append("[^/]")
              } else {
                [void]$builder.Append([regex]::Escape([string]$character))
              }
            }
            [void]$builder.Append("$")
            $matcher = [regex]::new($builder.ToString())

            $open = [string][char]123 + [char]123
            $close = [string][char]125 + [char]125
            $doubleQuote = [string][char]34
            $tab = $open + $doubleQuote + "\t" + $doubleQuote + $close
            $goTemplate = $open + ".ImportPath" + $close + $tab
            foreach ($field in @("GoFiles", "CgoFiles", "TestGoFiles", "XTestGoFiles")) {
              $goTemplate += $open + "range ." + $field + $close
              $goTemplate += $open + "$.Dir" + $close + "/" + $open + "." + $close + $tab
              $goTemplate += $open + "end" + $close
            }

            $workingDirectory = (Get-Location).Path.Replace("\", "/").TrimEnd("/")
            $rows = @(& go list -f $goTemplate @targets)
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            foreach ($row in $rows) {
              $fields = @($row.Split("`t", [System.StringSplitOptions]::RemoveEmptyEntries))
              if (-not $fields) { continue }
              $matched = $false
              if ($fields.Count -gt 1) {
                foreach ($path in $fields[1..($fields.Count - 1)]) {
                  $normalized = $path.Replace("\", "/")
                  if ($normalized.StartsWith(
                    $workingDirectory + "/", [System.StringComparison]::OrdinalIgnoreCase
                  )) {
                    $normalized = $normalized.Substring($workingDirectory.Length + 1)
                  }
                  if ($pattern -and $matcher.IsMatch($normalized.TrimStart([char[]]"./"))) {
                    $matched = $true
                    break
                  }
                }
              }
              if (-not $matched) { [Console]::Out.WriteLine($fields[0]) }
            }
          '
        platforms: [windows]
  prepare-overlay:
    dir: "{{.USER_WORKING_DIR}}"
    set: [errexit, nounset, pipefail]
    requires:
      vars:
        - name: SKIPFILES_TOOL
          enum: [biome, golangci, knip, sqlfluff]
        - SKIPFILES_OUTPUT
    env:
      SKIPFILES_TOOL: "{{.SKIPFILES_TOOL}}"
      SKIPFILES_PATTERN: '{{default "" .SKIPFILES_PATTERN}}'
      SKIPFILES_SOURCE_CONFIG: '{{default "" .SKIPFILES_SOURCE_CONFIG}}'
      SKIPFILES_OUTPUT: "{{.SKIPFILES_OUTPUT}}"
      SKIPFILES_ADDITIONAL_PATTERN: '{{default "" .SKIPFILES_ADDITIONAL_PATTERN}}'
      SKIPFILES_JS_RUNTIME: '{{default "node" .SKIPFILES_JS_RUNTIME}}'
    cmds:
      - cmd: |
          tool="$SKIPFILES_TOOL"
          pattern="$SKIPFILES_PATTERN"
          source_config="$SKIPFILES_SOURCE_CONFIG"
          output="$SKIPFILES_OUTPUT"
          additional_pattern="$SKIPFILES_ADDITIONAL_PATTERN"

          if [[ -z "$pattern" && -z "$additional_pattern" ]]; then
            rm -f "$output"
            exit 0
          fi

          json_escape() {
            local value="$1"
            value="${value//\\/\\\\}"
            value="${value//\"/\\\"}"
            value="${value//$'\n'/\\n}"
            printf '%s' "$value"
          }

          discover_config() {
            local candidate
            for candidate in "$@"; do
              if [[ -f "$candidate" ]]; then
                printf '%s' "$candidate"
                return
              fi
            done
          }

          case "$tool" in
            biome)
              if [[ -z "$source_config" ]]; then
                source_config="$(discover_config biome.json biome.jsonc || true)"
              fi
              includes="\"**\""
              if [[ -n "$pattern" ]]; then
                includes+=",\"!$(json_escape "$pattern")\""
              fi
              if [[ -n "$additional_pattern" && "$additional_pattern" != "$pattern" ]]; then
                includes+=",\"!$(json_escape "$additional_pattern")\""
              fi
              if [[ -n "$source_config" ]]; then
                printf '{"extends":["%s"],"files":{"includes":[%s]}}\n' \
                  "$(json_escape "$source_config")" "$includes" >"$output"
              else
                printf '{"files":{"includes":[%s]}}\n' "$includes" >"$output"
              fi
              ;;
            golangci)
              path_regex="$(printf '%s' "$pattern" | awk '
                {
                  glob = $0
                  gsub(/\\/, "/", glob)
                  regex = "^"
                  for (position = 1; position <= length(glob); position++) {
                    character = substr(glob, position, 1)
                    following = substr(glob, position + 1, 1)
                    if (character == "*") {
                      if (following == "*") {
                        if (substr(glob, position + 2, 1) == "/") {
                          regex = regex "(?:.*/)?"
                          position += 2
                        } else {
                          regex = regex ".*"
                          position += 1
                        }
                      } else {
                        regex = regex "[^/]*"
                      }
                    } else if (character == "?") {
                      regex = regex "[^/]"
                    } else if (index(".+()[]{}^$|\\", character) > 0) {
                      regex = regex "\\" character
                    } else {
                      regex = regex character
                    }
                  }
                  printf "%s$", regex
                }
              ')"
              export SKIPFILES_GOLANGCI_REGEX="$path_regex"
              if [[ -z "$source_config" || ! -f "$source_config" ]]; then
                printf "version: \"2\"\nlinters:\n  exclusions:\n    paths:\n      - |-\n        %s\n" \
                  "$path_regex" >"$output"
                exit 0
              fi

              first_content="$(awk '
                /^[[:space:]]*(#.*)?$/ { next }
                { sub(/^[[:space:]]*/, ""); print substr($0, 1, 1); exit }
              ' "$source_config")"
              if [[ "$first_content" == '{' ]]; then
                printf '%s\n' \
                  'GO_LINT_SKIP_PATTERN requires a YAML golangci-lint config on macOS and Linux.' \
                  'Convert the JSON config to YAML or add the exclusion to linters.exclusions.paths.' >&2
                exit 2
              fi

              awk '
                function indentation(value) {
                  match(value, /^ */)
                  return RLENGTH
                }
                function ignorable(value) {
                  return value ~ /^ *($|#)/
                }
                function trimmed(value, result) {
                  result = value
                  sub(/^ */, "", result)
                  sub(/ *$/, "", result)
                  return result
                }
                function mapping_key_kind(value, key, result) {
                  result = trimmed(value)
                  if (result ~ ("^" key ":[ ]*(#.*)?$")) return 1
                  if (result ~ ("^" key ":[ ]*\\{\\}[ ]*(#.*)?$")) return 2
                  if (result ~ ("^" key ":")) return 3
                  return 0
                }
                function block_end(start, base_indent, total, cursor) {
                  for (cursor = start + 1; cursor <= total; cursor++) {
                    if (!ignorable(lines[cursor]) && indentation(lines[cursor]) <= base_indent) {
                      return cursor
                    }
                  }
                  return total + 1
                }
                function child_indent(start, finish, base_indent, cursor, current, minimum) {
                  minimum = 0
                  for (cursor = start + 1; cursor < finish; cursor++) {
                    if (ignorable(lines[cursor])) continue
                    current = indentation(lines[cursor])
                    if (current > base_indent && (minimum == 0 || current < minimum)) minimum = current
                  }
                  return minimum == 0 ? base_indent + 2 : minimum
                }
                function spaces(count) {
                  return sprintf("%*s", count, "")
                }
                function fail(message) {
                  print "prepare golangci-lint overlay: " message > "/dev/stderr"
                  failed = 1
                }
                {
                  lines[NR] = $0
                }
                END {
                  regex = ENVIRON["SKIPFILES_GOLANGCI_REGEX"]
                  gsub(/\047/, "\047\047", regex)
                  quoted_regex = "\047" regex "\047"
                  total = NR

                  linters = 0
                  for (cursor = 1; cursor <= total; cursor++) {
                    if (indentation(lines[cursor]) != 0) continue
                    kind = mapping_key_kind(lines[cursor], "linters")
                    if (kind == 0) continue
                    if (kind == 3) {
                      fail("linters must be a YAML mapping")
                      exit 2
                    }
                    linters = cursor
                    if (kind == 2) lines[cursor] = "linters:"
                    break
                  }

                  if (linters == 0) {
                    for (cursor = 1; cursor <= total; cursor++) print lines[cursor]
                    if (total > 0 && lines[total] !~ /^ *$/) print ""
                    print "linters:"
                    print "  exclusions:"
                    print "    paths:"
                    print "      - " quoted_regex
                    exit
                  }

                  linters_end = block_end(linters, 0, total)
                  linters_child = child_indent(linters, linters_end, 0)
                  exclusions = 0
                  for (cursor = linters + 1; cursor < linters_end; cursor++) {
                    if (indentation(lines[cursor]) != linters_child) continue
                    kind = mapping_key_kind(lines[cursor], "exclusions")
                    if (kind == 0) continue
                    if (kind == 3) {
                      fail("linters.exclusions must be a YAML mapping")
                      exit 2
                    }
                    exclusions = cursor
                    if (kind == 2) lines[cursor] = spaces(linters_child) "exclusions:"
                    break
                  }

                  if (exclusions == 0) {
                    for (cursor = 1; cursor <= total + 1; cursor++) {
                      if (cursor == linters_end) {
                        print spaces(linters_child) "exclusions:"
                        print spaces(linters_child + 2) "paths:"
                        print spaces(linters_child + 4) "- " quoted_regex
                      }
                      if (cursor <= total) print lines[cursor]
                    }
                    exit
                  }

                  exclusions_end = block_end(exclusions, linters_child, total)
                  exclusions_child = child_indent(exclusions, exclusions_end, linters_child)
                  paths = 0
                  empty_paths = 0
                  for (cursor = exclusions + 1; cursor < exclusions_end; cursor++) {
                    if (indentation(lines[cursor]) != exclusions_child) continue
                    value = trimmed(lines[cursor])
                    if (value ~ /^paths:[ ]*(#.*)?$/) {
                      paths = cursor
                      break
                    }
                    if (value ~ /^paths:[ ]*\[\][ ]*(#.*)?$/) {
                      paths = cursor
                      empty_paths = 1
                      break
                    }
                    if (value ~ /^paths:/) {
                      fail("linters.exclusions.paths must be a block YAML sequence")
                      exit 2
                    }
                  }

                  if (paths == 0) {
                    for (cursor = 1; cursor <= total + 1; cursor++) {
                      if (cursor == exclusions_end) {
                        print spaces(exclusions_child) "paths:"
                        print spaces(exclusions_child + 2) "- " quoted_regex
                      }
                      if (cursor <= total) print lines[cursor]
                    }
                    exit
                  }

                  if (empty_paths) lines[paths] = spaces(exclusions_child) "paths:"
                  for (cursor = 1; cursor <= total; cursor++) {
                    print lines[cursor]
                    if (cursor == paths) print spaces(exclusions_child + 2) "- " quoted_regex
                  }
                }
              ' "$source_config" >"$output"
              ;;
            knip)
              if [[ -z "$source_config" ]]; then
                source_config="$(discover_config \
                  knip.json knip.jsonc .knip.json .knip.jsonc \
                  knip.ts knip.js knip.config.ts knip.config.js \
                  knip.config.mjs knip.config.cjs package.json || true)"
              fi
              case "${source_config##*.}" in
                js|mjs|cjs|ts)
                  printf '%s\n' \
                    'KNIP_LINT_SKIP_PATTERN cannot be merged with a dynamic JS/TS Knip config.' \
                    'Add the skip pattern to the config ignore array or use JSON/JSONC.' >&2
                  exit 2
                  ;;
              esac
              export SKIPFILES_KNIP_SOURCE_CONFIG="$source_config"
              export SKIPFILES_KNIP_OUTPUT="$output"
              "$SKIPFILES_JS_RUNTIME" -e '
                const fs = require("node:fs");
                const path = require("node:path");
                const parseJsonc = source => {
                  let output = "", inString = false, escaped = false;
                  let lineComment = false, blockComment = false;
                  for (let index = 0; index < source.length; index += 1) {
                    const character = source[index], next = source[index + 1];
                    if (lineComment) {
                      if (character === "\n") { lineComment = false; output += character; }
                      continue;
                    }
                    if (blockComment) {
                      if (character === "*" && next === "/") { blockComment = false; index += 1; }
                      continue;
                    }
                    if (!inString && character === "/" && next === "/") { lineComment = true; index += 1; continue; }
                    if (!inString && character === "/" && next === "*") { blockComment = true; index += 1; continue; }
                    output += character;
                    if (inString) {
                      if (escaped) escaped = false;
                      else if (character === "\\") escaped = true;
                      else if (character === "\"") inString = false;
                    } else if (character === "\"") inString = true;
                  }
                  return JSON.parse(output.replace(/,\s*([}\]])/g, "$1"));
                };
                const sourcePath = process.env.SKIPFILES_KNIP_SOURCE_CONFIG;
                let config = {};
                if (sourcePath) {
                  const parsed = parseJsonc(fs.readFileSync(sourcePath, "utf8"));
                  config = path.basename(sourcePath) === "package.json" ? (parsed.knip ?? {}) : parsed;
                }
                const pattern = process.env.SKIPFILES_PATTERN.replaceAll("\\", "/");
                config = { ...config, ignore: [...(config.ignore ?? []), pattern] };
                fs.writeFileSync(process.env.SKIPFILES_KNIP_OUTPUT, JSON.stringify(config, null, 2) + "\n");
              '
              ;;
            sqlfluff)
              pattern="${pattern//\\//}"
              if [[ -n "$source_config" && -f "$source_config" ]]; then
                awk -v pattern="$pattern" '
                  BEGIN { in_sqlfluff = 0; section_found = 0; key_found = 0 }
                  /^\[[^]]+\][[:space:]]*$/ {
                    if (in_sqlfluff && !key_found) { print "ignore_paths = " pattern; key_found = 1 }
                    in_sqlfluff = ($0 ~ /^\[sqlfluff\][[:space:]]*$/)
                    if (in_sqlfluff) { section_found = 1 }
                  }
                  in_sqlfluff && /^[[:space:]]*ignore_paths[[:space:]]*=/ {
                    value = $0
                    sub(/^[^=]*=[[:space:]]*/, "", value)
                    if (value == "") print "ignore_paths = " pattern
                    else print "ignore_paths = " value "," pattern
                    key_found = 1
                    next
                  }
                  { print }
                  END {
                    if (in_sqlfluff && !key_found) print "ignore_paths = " pattern
                    else if (!section_found) {
                      print ""
                      print "[sqlfluff]"
                      print "ignore_paths = " pattern
                    }
                  }
                ' "$source_config" >"$output"
              else
                printf '[sqlfluff]\nignore_paths = %s\n' "$pattern" >"$output"
              fi
              ;;
          esac
        platforms: [linux, darwin]
      - cmd: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command - <<'POWERSHELL'
          $ErrorActionPreference = 'Stop'
          $tool = $env:SKIPFILES_TOOL
          $pattern = $env:SKIPFILES_PATTERN
          $sourceConfig = $env:SKIPFILES_SOURCE_CONFIG
          $output = $env:SKIPFILES_OUTPUT
          $additionalPattern = $env:SKIPFILES_ADDITIONAL_PATTERN

          if ([string]::IsNullOrWhiteSpace($pattern) -and [string]::IsNullOrWhiteSpace($additionalPattern)) {
              Remove-Item -LiteralPath $output -Force -ErrorAction SilentlyContinue
              exit 0
          }

          function Find-Config([string[]]$candidates) {
              foreach ($candidate in $candidates) {
                  if (Test-Path -LiteralPath $candidate -PathType Leaf) { return $candidate }
              }
              return ''
          }

          if ($tool -eq 'golangci') {
              $normalizedPattern = $pattern.Replace('\', '/')
              $builder = [System.Text.StringBuilder]::new('^')
              for ($index = 0; $index -lt $normalizedPattern.Length; $index++) {
                  $character = $normalizedPattern[$index]
                  if ($character -eq '*') {
                      if (($index + 1) -lt $normalizedPattern.Length -and
                          $normalizedPattern[$index + 1] -eq '*') {
                          if (($index + 2) -lt $normalizedPattern.Length -and
                              $normalizedPattern[$index + 2] -eq '/') {
                              [void]$builder.Append('(?:.*/)?')
                              $index += 2
                          } else {
                              [void]$builder.Append('.*')
                              $index += 1
                          }
                      } else {
                          [void]$builder.Append('[^/]*')
                      }
                  } elseif ($character -eq '?') {
                      [void]$builder.Append('[^/]')
                  } else {
                      [void]$builder.Append([regex]::Escape([string]$character))
                  }
              }
              [void]$builder.Append('$')
              $pathRegex = $builder.ToString()
              $quotedRegex = "'" + $pathRegex.Replace("'", "''") + "'"

              if ([string]::IsNullOrWhiteSpace($sourceConfig) -or
                  -not (Test-Path -LiteralPath $sourceConfig -PathType Leaf)) {
                  @(
                      'version: "2"',
                      'linters:',
                      '  exclusions:',
                      '    paths:',
                      "      - $quotedRegex"
                  ) | Set-Content -LiteralPath $output -Encoding UTF8
                  exit 0
              }

              $firstContent = Get-Content -LiteralPath $sourceConfig |
                  Where-Object { $_ -notmatch '^\s*(?:#.*)?$' } |
                  Select-Object -First 1
              if ($firstContent.TrimStart().StartsWith('{')) {
                  $config = Get-Content -LiteralPath $sourceConfig -Raw | ConvertFrom-Json

                  function Get-Or-AddObjectProperty([object]$parent, [string]$name) {
                      $property = $parent.PSObject.Properties[$name]
                      if ($null -eq $property) {
                          $value = [pscustomobject]@{}
                          $parent | Add-Member -MemberType NoteProperty -Name $name -Value $value
                          return $value
                      }
                      if ($property.Value -isnot [pscustomobject]) {
                          throw "$name must be an object"
                      }
                      return $property.Value
                  }

                  $linters = Get-Or-AddObjectProperty $config 'linters'
                  $exclusions = Get-Or-AddObjectProperty $linters 'exclusions'
                  $pathsProperty = $exclusions.PSObject.Properties['paths']
                  if ($null -eq $pathsProperty) {
                      $exclusions | Add-Member -MemberType NoteProperty -Name 'paths' -Value @($pathRegex)
                  } elseif ($pathsProperty.Value -is [string]) {
                      throw 'linters.exclusions.paths must be an array'
                  } else {
                      $paths = @($pathsProperty.Value)
                      if ($pathRegex -notin $paths) {
                          $pathsProperty.Value = @($paths + $pathRegex)
                      }
                  }
                  $config | ConvertTo-Json -Depth 100 |
                      Set-Content -LiteralPath $output -Encoding UTF8
                  exit 0
              }

              function Get-YamlIndent([string]$line) {
                  return $line.Length - $line.TrimStart([char]' ').Length
              }
              function Test-YamlIgnorable([string]$line) {
                  return $line -match '^\s*(?:#.*)?$'
              }
              function Get-YamlMappingKeyKind([string]$line, [string]$key) {
                  $value = $line.Trim()
                  $escapedKey = [regex]::Escape($key)
                  if ($value -match "^${escapedKey}:\s*(?:#.*)?$") { return 1 }
                  if ($value -match "^${escapedKey}:\s*\{\}\s*(?:#.*)?$") { return 2 }
                  if ($value -match "^${escapedKey}:") { return 3 }
                  return 0
              }
              function Get-YamlBlockEnd(
                  [System.Collections.Generic.List[string]]$items,
                  [int]$start,
                  [int]$baseIndent
              ) {
                  for ($index = $start + 1; $index -lt $items.Count; $index++) {
                      if (-not (Test-YamlIgnorable $items[$index]) -and
                          (Get-YamlIndent $items[$index]) -le $baseIndent) {
                          return $index
                      }
                  }
                  return $items.Count
              }
              function Get-YamlChildIndent(
                  [System.Collections.Generic.List[string]]$items,
                  [int]$start,
                  [int]$finish,
                  [int]$baseIndent
              ) {
                  $minimum = 0
                  for ($index = $start + 1; $index -lt $finish; $index++) {
                      if (Test-YamlIgnorable $items[$index]) { continue }
                      $current = Get-YamlIndent $items[$index]
                      if ($current -gt $baseIndent -and
                          ($minimum -eq 0 -or $current -lt $minimum)) {
                          $minimum = $current
                      }
                  }
                  if ($minimum -eq 0) { return $baseIndent + 2 }
                  return $minimum
              }

              $lines = [System.Collections.Generic.List[string]]::new()
              foreach ($line in (Get-Content -LiteralPath $sourceConfig)) { $lines.Add($line) }
              $lintersIndex = -1
              for ($index = 0; $index -lt $lines.Count; $index++) {
                  if ((Get-YamlIndent $lines[$index]) -ne 0) { continue }
                  $kind = Get-YamlMappingKeyKind $lines[$index] 'linters'
                  if ($kind -eq 0) { continue }
                  if ($kind -eq 3) { throw 'linters must be a YAML mapping' }
                  $lintersIndex = $index
                  if ($kind -eq 2) { $lines[$index] = 'linters:' }
                  break
              }

              if ($lintersIndex -lt 0) {
                  if ($lines.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($lines[$lines.Count - 1])) {
                      $lines.Add('')
                  }
                  $lines.Add('linters:')
                  $lines.Add('  exclusions:')
                  $lines.Add('    paths:')
                  $lines.Add("      - $quotedRegex")
                  $lines | Set-Content -LiteralPath $output -Encoding UTF8
                  exit 0
              }

              $lintersEnd = Get-YamlBlockEnd $lines $lintersIndex 0
              $lintersIndent = Get-YamlChildIndent $lines $lintersIndex $lintersEnd 0
              $exclusionsIndex = -1
              for ($index = $lintersIndex + 1; $index -lt $lintersEnd; $index++) {
                  if ((Get-YamlIndent $lines[$index]) -ne $lintersIndent) { continue }
                  $kind = Get-YamlMappingKeyKind $lines[$index] 'exclusions'
                  if ($kind -eq 0) { continue }
                  if ($kind -eq 3) { throw 'linters.exclusions must be a YAML mapping' }
                  $exclusionsIndex = $index
                  if ($kind -eq 2) { $lines[$index] = (' ' * $lintersIndent) + 'exclusions:' }
                  break
              }

              if ($exclusionsIndex -lt 0) {
                  $lines.InsertRange($lintersEnd, [string[]]@(
                      (' ' * $lintersIndent) + 'exclusions:',
                      (' ' * ($lintersIndent + 2)) + 'paths:',
                      (' ' * ($lintersIndent + 4)) + "- $quotedRegex"
                  ))
                  $lines | Set-Content -LiteralPath $output -Encoding UTF8
                  exit 0
              }

              $exclusionsEnd = Get-YamlBlockEnd $lines $exclusionsIndex $lintersIndent
              $pathsIndent = Get-YamlChildIndent $lines $exclusionsIndex $exclusionsEnd $lintersIndent
              $pathsIndex = -1
              $emptyPaths = $false
              for ($index = $exclusionsIndex + 1; $index -lt $exclusionsEnd; $index++) {
                  if ((Get-YamlIndent $lines[$index]) -ne $pathsIndent) { continue }
                  $value = $lines[$index].Trim()
                  if ($value -match '^paths:\s*(?:#.*)?$') {
                      $pathsIndex = $index
                      break
                  }
                  if ($value -match '^paths:\s*\[\]\s*(?:#.*)?$') {
                      $pathsIndex = $index
                      $emptyPaths = $true
                      break
                  }
                  if ($value -match '^paths:') {
                      throw 'linters.exclusions.paths must be a block YAML sequence'
                  }
              }

              if ($pathsIndex -lt 0) {
                  $lines.InsertRange($exclusionsEnd, [string[]]@(
                      (' ' * $pathsIndent) + 'paths:',
                      (' ' * ($pathsIndent + 2)) + "- $quotedRegex"
                  ))
              } else {
                  if ($emptyPaths) { $lines[$pathsIndex] = (' ' * $pathsIndent) + 'paths:' }
                  $lines.Insert($pathsIndex + 1, (' ' * ($pathsIndent + 2)) + "- $quotedRegex")
              }
              $lines | Set-Content -LiteralPath $output -Encoding UTF8
              exit 0
          }

          if ($tool -eq 'biome') {
              if ([string]::IsNullOrWhiteSpace($sourceConfig)) {
                  $sourceConfig = Find-Config @('biome.json', 'biome.jsonc')
              }
              $config = [ordered]@{}
              if (-not [string]::IsNullOrWhiteSpace($sourceConfig)) {
                  $config.extends = @($sourceConfig.Replace('\', '/'))
              }
              $includes = @('**')
              if (-not [string]::IsNullOrWhiteSpace($pattern)) {
                  $includes += '!' + $pattern.Replace('\', '/')
              }
              if (-not [string]::IsNullOrWhiteSpace($additionalPattern) -and $additionalPattern -ne $pattern) {
                  $includes += '!' + $additionalPattern.Replace('\', '/')
              }
              $config.files = [ordered]@{ includes = $includes }
              $config | ConvertTo-Json -Depth 8 | Set-Content -LiteralPath $output -Encoding UTF8
              exit 0
          }

          if ($tool -eq 'knip') {
              if ([string]::IsNullOrWhiteSpace($sourceConfig)) {
                  $sourceConfig = Find-Config @(
                      'knip.json', 'knip.jsonc', '.knip.json', '.knip.jsonc',
                      'knip.ts', 'knip.js', 'knip.config.ts', 'knip.config.js',
                      'knip.config.mjs', 'knip.config.cjs', 'package.json'
                  )
              }
              if ($sourceConfig -match '\.(?:[cm]?js|ts)$') {
                  Write-Error (
                      'KNIP_LINT_SKIP_PATTERN cannot be merged with a dynamic JS/TS Knip config. ' +
                      'Add the skip pattern to the config ignore array or use JSON/JSONC.'
                  )
                  exit 2
              }
              $env:SKIPFILES_KNIP_SOURCE_CONFIG = $sourceConfig
              $env:SKIPFILES_KNIP_OUTPUT = $output
              $code = @'
          const fs = require("node:fs");
          const path = require("node:path");
          const parseJsonc = source => {
            let output = "", inString = false, escaped = false;
            let lineComment = false, blockComment = false;
            for (let index = 0; index < source.length; index += 1) {
              const character = source[index], next = source[index + 1];
              if (lineComment) {
                if (character === "\n") { lineComment = false; output += character; }
                continue;
              }
              if (blockComment) {
                if (character === "*" && next === "/") { blockComment = false; index += 1; }
                continue;
              }
              if (!inString && character === "/" && next === "/") {
                lineComment = true; index += 1; continue;
              }
              if (!inString && character === "/" && next === "*") {
                blockComment = true; index += 1; continue;
              }
              output += character;
              if (inString) {
                if (escaped) escaped = false;
                else if (character === "\\") escaped = true;
                else if (character === "\"") inString = false;
              } else if (character === "\"") inString = true;
            }
            return JSON.parse(output.replace(/,\s*([}\]])/g, "$1"));
          };
          const sourcePath = process.env.SKIPFILES_KNIP_SOURCE_CONFIG;
          let config = {};
          if (sourcePath) {
            const parsed = parseJsonc(fs.readFileSync(sourcePath, "utf8"));
            config = path.basename(sourcePath) === "package.json" ? (parsed.knip ?? {}) : parsed;
          }
          const pattern = process.env.SKIPFILES_PATTERN.replaceAll("\\", "/");
          config = { ...config, ignore: [...(config.ignore ?? []), pattern] };
          fs.writeFileSync(process.env.SKIPFILES_KNIP_OUTPUT, JSON.stringify(config, null, 2) + "\n");
          '@
              & $env:SKIPFILES_JS_RUNTIME -e $code
              exit $LASTEXITCODE
          }

          $normalizedPattern = $pattern.Replace('\', '/')
          if (-not [string]::IsNullOrWhiteSpace($sourceConfig) -and
              (Test-Path -LiteralPath $sourceConfig -PathType Leaf)) {
              $lines = @(Get-Content -LiteralPath $sourceConfig)
              $result = [System.Collections.Generic.List[string]]::new()
              $inSqlfluff = $false
              $sectionFound = $false
              $keyFound = $false
              foreach ($line in $lines) {
                  if ($line -match '^\[[^]]+\]\s*$') {
                      if ($inSqlfluff -and -not $keyFound) {
                          $result.Add("ignore_paths = $normalizedPattern")
                          $keyFound = $true
                      }
                      $inSqlfluff = $line -match '^\[sqlfluff\]\s*$'
                      if ($inSqlfluff) { $sectionFound = $true }
                  }
                  if ($inSqlfluff -and $line -match '^\s*ignore_paths\s*=\s*(.*)$') {
                      $existing = $Matches[1]
                      $separator = if ([string]::IsNullOrWhiteSpace($existing)) { '' } else { ',' }
                      $result.Add("ignore_paths = $existing$separator$normalizedPattern")
                      $keyFound = $true
                  } else {
                      $result.Add($line)
                  }
              }
              if ($inSqlfluff -and -not $keyFound) {
                  $result.Add("ignore_paths = $normalizedPattern")
              } elseif (-not $sectionFound) {
                  $result.Add('')
                  $result.Add('[sqlfluff]')
                  $result.Add("ignore_paths = $normalizedPattern")
              }
              Set-Content -LiteralPath $output -Encoding UTF8 -Value $result
          } else {
              Set-Content -LiteralPath $output -Encoding UTF8 -Value "[sqlfluff]`nignore_paths = $normalizedPattern"
          }
          POWERSHELL
        platforms: [windows]
  cleanup:
    dir: "{{.USER_WORKING_DIR}}"
    requires:
      vars: [SKIPFILES_OUTPUT]
    env:
      SKIPFILES_OUTPUT: "{{.SKIPFILES_OUTPUT}}"
    cmds:
      - cmd: rm -f "$SKIPFILES_OUTPUT"
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -LiteralPath $env:SKIPFILES_OUTPUT -Force -ErrorAction SilentlyContinue"
        platforms: [windows]

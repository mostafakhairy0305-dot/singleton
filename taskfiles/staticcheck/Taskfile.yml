---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
includes:
  go:
    taskfile: ../go/Taskfile.yml
vars:
  STATICCHECK_LINT_SKIP_PATTERN: ""
  STATICCHECK_VERSION: "2026.1"
  STATICCHECK_RELEASE_BASE_URL: https://github.com/dominikh/go-tools/releases/download
  GLOBAL_GO_BIN:
    sh: |
      gobin="$(go env GOBIN)"
      if [ -z "$gobin" ]; then
        gobin="$(go env GOPATH)/bin"
      fi
      printf '%s' "$gobin"
tasks:
  default:
    run: once
    desc: Show available Staticcheck automation tasks
    summary: Display the list of available Staticcheck-related tasks defined in this Taskfile.
    cmds:
      - task --list
  install:
    run: once
    desc: Install Staticcheck into the global Go bin
    summary: |
      Download the pinned Staticcheck release for the current platform and
      install it directly under GOBIN, falling back to GOPATH/bin when GOBIN
      is unset. The pinned version is replaced automatically when it changes.
    cmds:
      - task: _install:darwin
      - task: _install:linux
      - task: _install:windows
  install:undo:
    run: once
    desc: Remove Staticcheck from the global Go bin
    summary: |
      Remove the Staticcheck binary installed under GOBIN, falling back to
      GOPATH/bin when GOBIN is unset.
    aliases:
      - uninstall
    prompt:
      - This will remove Staticcheck from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows
  upgrade:
    run: once
    desc: Upgrade Staticcheck to the pinned STATICCHECK_VERSION
    summary: |
      Re-download and install the STATICCHECK_VERSION binary, replacing any
      existing installation. Update STATICCHECK_VERSION in the Taskfile vars
      to change the target release.
    cmds:
      - task: _install:darwin
        vars:
          FORCE: "true"
      - task: _install:linux
        vars:
          FORCE: "true"
      - task: _install:windows
        vars:
          FORCE: "true"
  lint:
    run: once
    desc: Run Staticcheck against Go packages
    summary: |
      Run the pinned Staticcheck binary. TARGETS defaults to ./....
      Pass CLI arguments after -- to override TARGETS and EXTRA_ARGS directly.
      Ensures both Staticcheck and the Go toolchain are installed first.
    deps:
      - install
      - go:install
    cmds:
      - task: _lint:unix
      - task: _lint:windows
      - echo "✅ staticcheck passed"
  version:
    run: once
    desc: Print the installed Staticcheck version
    summary: Print the pinned Staticcheck binary version. Installs Staticcheck first if missing.
    deps:
      - install
    cmds:
      - task: _version:unix
      - task: _version:windows
  _install:darwin:
    run: once
    internal: true
    desc: Install Staticcheck on macOS
    summary: Download and install the pinned Staticcheck macOS archive for the current CPU architecture.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    vars:
      STATICCHECK_UNAME_ARCH:
        sh: uname -m
      STATICCHECK_ASSET: >-
        {{if or (eq .STATICCHECK_UNAME_ARCH "arm64") (eq .STATICCHECK_UNAME_ARCH "aarch64")}}darwin_arm64 {{- else if or (eq .STATICCHECK_UNAME_ARCH "x86_64") (eq .STATICCHECK_UNAME_ARCH "amd64")}}darwin_amd64 {{- else}}{{.STATICCHECK_UNAME_ARCH}}{{end}}
      STATICCHECK_ASSET_SUPPORTED: >-
        {{if or (eq .STATICCHECK_ASSET "darwin_arm64") (eq .STATICCHECK_ASSET "darwin_amd64")}}true {{- else}}false{{end}}
      STATICCHECK_TMP_DIR: "/tmp/taskotter-staticcheck-{{.STATICCHECK_VERSION}}-{{.STATICCHECK_ASSET}}"
      STATICCHECK_ARCHIVE: "/tmp/taskotter-staticcheck-{{.STATICCHECK_VERSION}}-{{.STATICCHECK_ASSET}}.tar.gz"
    status:
      - '[ "{{default "false" .FORCE}}" != "true" ]'
      - test -x "{{.GLOBAL_GO_BIN}}/staticcheck"
      - '"{{.GLOBAL_GO_BIN}}/staticcheck" -version | grep -Fq "staticcheck {{.STATICCHECK_VERSION}}"'
    preconditions:
      - sh: '[ "{{.STATICCHECK_ASSET_SUPPORTED}}" = "true" ]'
        msg: Unsupported macOS architecture {{.STATICCHECK_UNAME_ARCH}}.
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download Staticcheck.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract Staticcheck.
      - sh: command -v find >/dev/null 2>&1
        msg: find is required to locate the Staticcheck binary after extraction.
      - sh: command -v install >/dev/null 2>&1
        msg: install is required to copy Staticcheck into the global Go bin.
    cmds:
      - cmd: rm -rf "{{if eq .ITEM "tmp"}}{{.STATICCHECK_TMP_DIR}}{{else}}{{.STATICCHECK_ARCHIVE}}{{end}}"
        for:
          - tmp
          - archive
      - mkdir -p "{{.GLOBAL_GO_BIN}}"
      - mkdir -p "{{.STATICCHECK_TMP_DIR}}"
      - >-
        curl -fsSL "{{.STATICCHECK_RELEASE_BASE_URL}}/{{.STATICCHECK_VERSION}}/staticcheck_{{.STATICCHECK_ASSET}}.tar.gz" -o "{{.STATICCHECK_ARCHIVE}}"
      - tar -xzf "{{.STATICCHECK_ARCHIVE}}" -C "{{.STATICCHECK_TMP_DIR}}"
      - cmd: rm -rf "{{.GLOBAL_GO_BIN}}/staticcheck"
        if: test -d "{{.GLOBAL_GO_BIN}}/staticcheck"
      - >-
        install -m 0755 "$(find "{{.STATICCHECK_TMP_DIR}}" -type f -name staticcheck -print -quit)" "{{.GLOBAL_GO_BIN}}/staticcheck"
      - cmd: rm -rf "{{if eq .ITEM "tmp"}}{{.STATICCHECK_TMP_DIR}}{{else}}{{.STATICCHECK_ARCHIVE}}{{end}}"
        for:
          - tmp
          - archive
  _install:linux:
    run: once
    internal: true
    desc: Install Staticcheck on Linux
    summary: Download and install the pinned Staticcheck Linux archive for the current CPU architecture.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      STATICCHECK_UNAME_ARCH:
        sh: uname -m
      STATICCHECK_ASSET: >-
        {{if or (eq .STATICCHECK_UNAME_ARCH "x86_64") (eq .STATICCHECK_UNAME_ARCH "amd64")}}linux_amd64 {{- else if or (eq .STATICCHECK_UNAME_ARCH "aarch64") (eq .STATICCHECK_UNAME_ARCH "arm64")}}linux_arm64 {{- else if or (eq .STATICCHECK_UNAME_ARCH "i386") (eq .STATICCHECK_UNAME_ARCH "i686")}}linux_386 {{- else if eq .STATICCHECK_UNAME_ARCH "armv7l"}}linux_armv7l {{- else if eq .STATICCHECK_UNAME_ARCH "armv6l"}}linux_armv6l {{- else if eq .STATICCHECK_UNAME_ARCH "armv5l"}}linux_armv5l {{- else}}{{.STATICCHECK_UNAME_ARCH}}{{end}}
      STATICCHECK_ASSET_SUPPORTED: >-
        {{if or (eq .STATICCHECK_ASSET "linux_amd64") (eq .STATICCHECK_ASSET "linux_arm64") (eq .STATICCHECK_ASSET "linux_386") (eq .STATICCHECK_ASSET "linux_armv7l") (eq .STATICCHECK_ASSET "linux_armv6l") (eq .STATICCHECK_ASSET "linux_armv5l")}}true {{- else}}false{{end}}
      STATICCHECK_TMP_DIR: "/tmp/taskotter-staticcheck-{{.STATICCHECK_VERSION}}-{{.STATICCHECK_ASSET}}"
      STATICCHECK_ARCHIVE: "/tmp/taskotter-staticcheck-{{.STATICCHECK_VERSION}}-{{.STATICCHECK_ASSET}}.tar.gz"
    status:
      - '[ "{{default "false" .FORCE}}" != "true" ]'
      - test -x "{{.GLOBAL_GO_BIN}}/staticcheck"
      - '"{{.GLOBAL_GO_BIN}}/staticcheck" -version | grep -Fq "staticcheck {{.STATICCHECK_VERSION}}"'
    preconditions:
      - sh: '[ "{{.STATICCHECK_ASSET_SUPPORTED}}" = "true" ]'
        msg: Unsupported Linux architecture {{.STATICCHECK_UNAME_ARCH}}.
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download Staticcheck.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract Staticcheck.
      - sh: command -v find >/dev/null 2>&1
        msg: find is required to locate the Staticcheck binary after extraction.
      - sh: command -v install >/dev/null 2>&1
        msg: install is required to copy Staticcheck into the global Go bin.
    cmds:
      - cmd: rm -rf "{{if eq .ITEM "tmp"}}{{.STATICCHECK_TMP_DIR}}{{else}}{{.STATICCHECK_ARCHIVE}}{{end}}"
        for:
          - tmp
          - archive
      - mkdir -p "{{.GLOBAL_GO_BIN}}"
      - mkdir -p "{{.STATICCHECK_TMP_DIR}}"
      - >-
        curl -fsSL "{{.STATICCHECK_RELEASE_BASE_URL}}/{{.STATICCHECK_VERSION}}/staticcheck_{{.STATICCHECK_ASSET}}.tar.gz" -o "{{.STATICCHECK_ARCHIVE}}"
      - tar -xzf "{{.STATICCHECK_ARCHIVE}}" -C "{{.STATICCHECK_TMP_DIR}}"
      - cmd: rm -rf "{{.GLOBAL_GO_BIN}}/staticcheck"
        if: test -d "{{.GLOBAL_GO_BIN}}/staticcheck"
      - >-
        install -m 0755 "$(find "{{.STATICCHECK_TMP_DIR}}" -type f -name staticcheck -print -quit)" "{{.GLOBAL_GO_BIN}}/staticcheck"
      - cmd: rm -rf "{{if eq .ITEM "tmp"}}{{.STATICCHECK_TMP_DIR}}{{else}}{{.STATICCHECK_ARCHIVE}}{{end}}"
        for:
          - tmp
          - archive
  _install:windows:
    run: once
    internal: true
    desc: Install Staticcheck on Windows
    summary: Download and install the pinned Staticcheck Windows archive for the current CPU architecture.
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if ('{{default "false" .FORCE}}' -eq 'true') { exit 1 }; if ((Test-Path '{{.GLOBAL_GO_BIN}}/staticcheck.exe') -and ((& '{{.GLOBAL_GO_BIN}}/staticcheck.exe' -version) -like '*staticcheck {{.STATICCHECK_VERSION}}*')) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if ($env:PROCESSOR_ARCHITECTURE -eq 'AMD64' -or $env:PROCESSOR_ARCHITECTURE -eq 'x86') { exit 0 } else { exit 1 }"
        msg: Staticcheck archive install supports AMD64 and x86 Windows architectures.
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command tar -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: tar is required to extract Staticcheck on Windows.
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.GLOBAL_GO_BIN}}' | Out-Null"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item (Join-Path $env:TEMP 'taskotter-staticcheck-{{.STATICCHECK_VERSION}}'), (Join-Path $env:TEMP 'taskotter-staticcheck.tar.gz') -Recurse -Force -ErrorAction SilentlyContinue"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path (Join-Path $env:TEMP 'taskotter-staticcheck-{{.STATICCHECK_VERSION}}') | Out-Null"
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri '{{.STATICCHECK_RELEASE_BASE_URL}}/{{.STATICCHECK_VERSION}}/staticcheck_windows_amd64.tar.gz' -OutFile (Join-Path $env:TEMP 'taskotter-staticcheck.tar.gz')"
        if: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if ($env:PROCESSOR_ARCHITECTURE -eq 'AMD64') { exit 0 } else { exit 1 }"
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri '{{.STATICCHECK_RELEASE_BASE_URL}}/{{.STATICCHECK_VERSION}}/staticcheck_windows_386.tar.gz' -OutFile (Join-Path $env:TEMP 'taskotter-staticcheck.tar.gz')"
        if: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if ($env:PROCESSOR_ARCHITECTURE -eq 'x86') { exit 0 } else { exit 1 }"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "tar -xzf (Join-Path $env:TEMP 'taskotter-staticcheck.tar.gz') -C (Join-Path $env:TEMP 'taskotter-staticcheck-{{.STATICCHECK_VERSION}}')"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path '{{.GLOBAL_GO_BIN}}/staticcheck.exe' -PathType Container) {

          Remove-Item '{{.GLOBAL_GO_BIN}}/staticcheck.exe' -Recurse -Force
        }"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Copy-Item (Get-ChildItem -Path (Join-Path $env:TEMP 'taskotter-staticcheck-{{.STATICCHECK_VERSION}}') -Recurse -Filter 'staticcheck.exe' | Select-Object -First 1 -ExpandProperty FullName) '{{.GLOBAL_GO_BIN}}/staticcheck.exe' -Force"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item (Join-Path $env:TEMP 'taskotter-staticcheck-{{.STATICCHECK_VERSION}}'), (Join-Path $env:TEMP 'taskotter-staticcheck.tar.gz') -Recurse -Force -ErrorAction SilentlyContinue"
  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '! test -e "{{.GLOBAL_GO_BIN}}/staticcheck"'
    cmds:
      - echo 'Removing Staticcheck...'
      - rm -f "{{.GLOBAL_GO_BIN}}/staticcheck"
      - echo 'Staticcheck removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Test-Path '{{.GLOBAL_GO_BIN}}/staticcheck.exe') { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing Staticcheck...
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item '{{.GLOBAL_GO_BIN}}/staticcheck.exe' -Force -ErrorAction SilentlyContinue"
      - echo Staticcheck removed.
  _lint:unix:
    run: once
    internal: true
    desc: Run Staticcheck on macOS or Linux
    summary: Run the pinned Staticcheck binary on macOS or Linux.
    platforms: [linux, darwin]
    vars:
      TARGETS: "./..."
      EXTRA_ARGS: ""
    cmds:
      - |
        skip_pattern='{{if .STATICCHECK_LINT_SKIP_PATTERN_OVERRIDE}}{{.STATICCHECK_LINT_SKIP_PATTERN_OVERRIDE}}
        {{- else}}{{.STATICCHECK_LINT_SKIP_PATTERN}}{{end}}'
        if [ -z "$skip_pattern" ]; then
          "{{.GLOBAL_GO_BIN}}/staticcheck" \
            {{if .CLI_ARGS}}{{.CLI_ARGS}}
            {{- else}}{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}
            {{- else}}{{.TARGETS}}{{end}} \
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
          {{- else}}{{.EXTRA_ARGS}}{{end}}{{end}}
          exit
        fi
        package_list="$(mktemp)"
        trap 'rm -f "$package_list"' EXIT
        export SKIPFILES_PATTERN="$skip_pattern"
        export SKIPFILES_GO_TARGETS='{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}
        {{- else}}{{.TARGETS}}{{end}}'
        task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
          go-packages >"$package_list"
        if [ ! -s "$package_list" ]; then
          echo 'No matching Go packages found'
          exit 0
        fi
        xargs -0 "{{.GLOBAL_GO_BIN}}/staticcheck" \
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
          {{- else}}{{.EXTRA_ARGS}}{{end}} \
          {{.CLI_ARGS}} <"$package_list"
  _lint:windows:
    run: once
    internal: true
    desc: Run Staticcheck on Windows
    summary: Run the pinned Staticcheck binary on Windows.
    platforms: [windows]
    vars:
      TARGETS: "./..."
      EXTRA_ARGS: ""
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$skipPattern='{{if .STATICCHECK_LINT_SKIP_PATTERN_OVERRIDE}}{{.STATICCHECK_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.STATICCHECK_LINT_SKIP_PATTERN}}{{end}}'; if (-not $skipPattern) {

          & '{{.GLOBAL_GO_BIN}}/staticcheck.exe'
            {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}
            {{- else}}{{.TARGETS}}{{end}}
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{end}};
          exit $LASTEXITCODE
        }; $env:SKIPFILES_PATTERN = $skipPattern; $env:SKIPFILES_GO_TARGETS = '{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}} {{- else}}{{.TARGETS}}{{end}}'; $packages=@(& task --silent

          --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
          go-packages);
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; if (-not $packages) { Write-Host 'No matching Go packages found'; exit 0 }; & '{{.GLOBAL_GO_BIN}}/staticcheck.exe'

          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
          {{- else}}{{.EXTRA_ARGS}}{{end}}
          {{.CLI_ARGS}} @packages;
        exit $LASTEXITCODE"
  _version:unix:
    run: once
    internal: true
    desc: Print Staticcheck version on macOS or Linux
    summary: Print the pinned Staticcheck binary version on macOS or Linux.
    platforms: [linux, darwin]
    cmds:
      - '"{{.GLOBAL_GO_BIN}}/staticcheck" -version'
  _version:windows:
    run: once
    internal: true
    desc: Print Staticcheck version on Windows
    summary: Print the pinned Staticcheck binary version on Windows.
    platforms: [windows]
    cmds:
      - '"{{.GLOBAL_GO_BIN}}/staticcheck.exe" -version'

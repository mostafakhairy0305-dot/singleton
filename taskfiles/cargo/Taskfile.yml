---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
includes:
  skipfiles:
    taskfile: ../internal/skipfiles/Taskfile.yml
    internal: true
vars:
  CARGO_LINT_SKIP_PATTERN: ""
  CARGO_FMT_SKIP_PATTERN: ""
  RUSTUP_INSTALL_URL: "https://sh.rustup.rs"
  RUSTUP_INSTALL_URL_WINDOWS: "https://win.rustup.rs/x86_64"
  RUST_TOOLCHAIN: ""
  CARGO_BIN_UNIX: "$HOME/.cargo/bin"
  EXTRA_ARGS: ""
tasks:
  default:
    run: once
    desc: Show available Cargo automation tasks
    summary: Display the list of available Cargo-related tasks defined in this Taskfile.
    cmds:
      - task --list
  install:
    run: once
    desc: Install the Rust toolchain via rustup
    summary: |
      Install the Rust toolchain (cargo, rustc, rustfmt, clippy) with the
      official rustup installer when cargo is not already available. macOS and
      Linux use the sh.rustup.rs script; Windows uses rustup-init.exe. Leave
      RUST_TOOLCHAIN empty to install the stable toolchain, or set it to a
      channel or version such as nightly or 1.79.0.
    cmds:
      - task: _install:unix
      - task: _install:windows
  install:undo:
    run: once
    desc: Remove the Rust toolchain installed by rustup
    summary: Remove the entire rustup-managed Rust toolchain via `rustup self uninstall`.
    aliases:
      - uninstall
    prompt:
      - This will remove the Rust toolchain and rustup from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows
  upgrade:
    run: once
    desc: Upgrade the Rust toolchain with rustup update
    summary: |
      Update the installed Rust toolchains with `rustup update`. When
      RUST_TOOLCHAIN is set, only that toolchain is updated. Auto-installs
      rustup if it is missing.
    deps:
      - install
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows
  build:
    run: once
    desc: Build the crate with cargo build (EXTRA_ARGS=flags)
    summary: |
      Compile the crate in the current directory with `cargo build`. Pass
      EXTRA_ARGS for cargo flags such as --release or -p <crate>. Auto-installs
      the Rust toolchain if needed.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "build"
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "build"
  check:
    run: once
    desc: Type-check the crate with cargo check (EXTRA_ARGS=flags)
    summary: |
      Check the crate in the current directory with `cargo check` without
      producing binaries. Pass EXTRA_ARGS for cargo flags. Auto-installs the
      Rust toolchain if needed.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "check"
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "check"
  test:
    run: once
    desc: Run the crate test suite with cargo test (EXTRA_ARGS=flags)
    summary: |
      Run the crate's tests in the current directory with `cargo test`. Pass
      EXTRA_ARGS for cargo flags or test filters. Auto-installs the Rust
      toolchain if needed.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "test"
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "test"
  fmt:
    run: once
    desc: Format Rust code with cargo fmt (EXTRA_ARGS=flags)
    summary: |
      Reformat Rust code in the current crate with `cargo fmt`. Pass EXTRA_ARGS
      for rustfmt options. Auto-installs the Rust toolchain if needed.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "fmt"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_FMT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_FMT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_FMT_SKIP_PATTERN}}{{end}}
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "fmt"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_FMT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_FMT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_FMT_SKIP_PATTERN}}{{end}}
  fmt:check:
    run: once
    desc: Check Rust formatting with cargo fmt --check (EXTRA_ARGS=flags)
    summary: |
      Report formatting differences in the current crate with
      `cargo fmt --check` without modifying files. Pass EXTRA_ARGS for rustfmt
      options. Auto-installs the Rust toolchain if needed.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "fmt --check"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_FMT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_FMT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_FMT_SKIP_PATTERN}}{{end}}
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "fmt --check"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_FMT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_FMT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_FMT_SKIP_PATTERN}}{{end}}
  lint:
    run: once
    desc: Lint Rust code with cargo clippy (EXTRA_ARGS=flags)
    summary: |
      Lint the current crate with `cargo clippy`. Pass EXTRA_ARGS for cargo or
      clippy flags such as -- -D warnings. Auto-installs the Rust toolchain if
      needed.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "clippy"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_LINT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_LINT_SKIP_PATTERN}}{{end}}
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "clippy"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_LINT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_LINT_SKIP_PATTERN}}{{end}}
  lint:fix:
    run: once
    desc: Auto-fix Rust lint issues with cargo clippy --fix
    summary: |
      Apply clippy's automatic fixes to the current crate with
      `cargo clippy --fix`. Pass EXTRA_ARGS for cargo or clippy flags such as
      --allow-dirty. Auto-installs the Rust toolchain if needed.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "clippy --fix"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_LINT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_LINT_SKIP_PATTERN}}{{end}}
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "clippy --fix"
          CARGO_SKIP_PATTERN: >-
            {{if .CARGO_LINT_SKIP_PATTERN_OVERRIDE}}{{.CARGO_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.CARGO_LINT_SKIP_PATTERN}}{{end}}
  version:
    run: once
    desc: Show the installed cargo version
    summary: Print the active cargo version via `cargo --version`. Auto-installs the Rust toolchain if missing.
    deps:
      - install
    cmds:
      - task: _cargo:unix
        vars:
          CARGO_SUBCMD: "--version"
      - task: _cargo:windows
        vars:
          CARGO_SUBCMD: "--version"
  which:
    run: once
    desc: Show the path to the cargo binary
    summary: |
      Print the cargo binary resolved from PATH, falling back to
      CARGO_BIN_UNIX. Auto-installs the Rust toolchain if missing.
    deps:
      - install
    cmds:
      - task: _which:unix
      - task: _which:windows
  verify:
    run: once
    desc: Verify the Rust toolchain installation
    summary: |
      Print the active cargo and rustc versions and the rustup toolchain
      overview for quick installation diagnostics. Auto-installs the Rust
      toolchain if missing.
    deps:
      - install
    cmds:
      - task: _verify:unix
      - task: _verify:windows
  _install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        command -v cargo >/dev/null 2>&1 && { [ -z "{{.RUST_TOOLCHAIN}}" ] || rustup show 2>/dev/null | grep -Fq "{{.RUST_TOOLCHAIN}}"; }
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download the rustup installer.
    cmds:
      - echo 'Installing the Rust toolchain via rustup...'
      - >-
        curl --proto '=https' --tlsv1.2 -sSf "{{.RUSTUP_INSTALL_URL}}" | sh -s -- -y --default-toolchain {{default "stable" .RUST_TOOLCHAIN}}
      - echo 'Rust installed. Restart your shell if cargo is not yet in PATH.'
  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command cargo -ErrorAction SilentlyContinue) { $requested = '{{.RUST_TOOLCHAIN}}'; if ([string]::IsNullOrWhiteSpace($requested) -or ((rustup show) -match [regex]::Escape($requested))) { exit 0 } }; exit 1"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$exe = Join-Path $env:TEMP 'rustup-init.exe'; Write-Host 'Downloading rustup-init.exe...'; Invoke-WebRequest -Uri '{{.RUSTUP_INSTALL_URL_WINDOWS}}/rustup-init.exe' -OutFile $exe; & $exe -y --default-toolchain {{default "stable" .RUST_TOOLCHAIN}}; Remove-Item $exe -Force -ErrorAction SilentlyContinue"
  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '! command -v rustup >/dev/null 2>&1 && ! test -x "{{.CARGO_BIN_UNIX}}/rustup"'
    cmds:
      - |
        rustup="$(command -v rustup || echo "{{.CARGO_BIN_UNIX}}/rustup")"
        "$rustup" self uninstall -y
      - echo 'Rust toolchain removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command rustup -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "rustup self uninstall -y"
  _upgrade:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    cmds:
      - |
        rustup="$(command -v rustup || echo "{{.CARGO_BIN_UNIX}}/rustup")"
        "$rustup" update {{.RUST_TOOLCHAIN}}
  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "rustup update {{.RUST_TOOLCHAIN}}"
  _which:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    cmds:
      - command -v cargo || printf '%s\n' "{{.CARGO_BIN_UNIX}}/cargo"
  _which:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$c = (Get-Command cargo -ErrorAction SilentlyContinue).Source; if ($c) { $c } else { Join-Path $env:USERPROFILE '.cargo\bin\cargo.exe' }"
  _verify:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    cmds:
      - |
        cargo="$(command -v cargo || echo "{{.CARGO_BIN_UNIX}}/cargo")"
        rustc="$(command -v rustc || echo "{{.CARGO_BIN_UNIX}}/rustc")"
        rustup="$(command -v rustup || echo "{{.CARGO_BIN_UNIX}}/rustup")"
        "$cargo" --version
        "$rustc" --version
        "$rustup" show
  _verify:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "cargo --version; rustc --version; rustup show"
  _cargo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        cargo="$(command -v cargo || echo "{{.CARGO_BIN_UNIX}}/cargo")"
        skip_pattern='{{default "" .CARGO_SKIP_PATTERN}}'
        if [ -z "$skip_pattern" ]; then
          "$cargo" {{if .RUST_TOOLCHAIN}}+{{.RUST_TOOLCHAIN}} {{end}}{{.CARGO_SUBCMD}} \
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}
          exit
        fi

        skipped_packages=''
        while IFS= read -r source_file; do
          package_dir="$(dirname "$source_file")"
          while [ "$package_dir" != '/' ] && [ ! -f "$package_dir/Cargo.toml" ]; do
            package_dir="$(dirname "$package_dir")"
          done
          [ -f "$package_dir/Cargo.toml" ] || continue
          package_name="$(awk '
            /^\[package\][[:space:]]*$/ { in_package=1; next }
            /^\[/ { in_package=0 }
            in_package && /^[[:space:]]*name[[:space:]]*=/ {
              value=$0; sub(/^[^=]*=[[:space:]]*/, "", value); gsub(/["'"'"']/, "", value); print value; exit
            }
          ' "$package_dir/Cargo.toml")"
          [ -n "$package_name" ] || continue
          case " $skipped_packages " in
            *" $package_name "*) ;;
            *) skipped_packages="$skipped_packages $package_name" ;;
          esac
        done < <(
          find . -type f -name '*.rs' ! -path './target/*' ! -path './.git/*' -print0 |
            task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
              filter "SKIPFILES_PATTERN=$skip_pattern" SKIPFILES_MATCHING=true |
            tr '\0' '\n'
        )

        if [ -z "${skipped_packages# }" ]; then
          "$cargo" {{if .RUST_TOOLCHAIN}}+{{.RUST_TOOLCHAIN}} {{end}}{{.CARGO_SUBCMD}} \
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}
          exit
        fi

        set --
        while IFS= read -r manifest; do
          package_name="$(awk '
            /^\[package\][[:space:]]*$/ { in_package=1; next }
            /^\[/ { in_package=0 }
            in_package && /^[[:space:]]*name[[:space:]]*=/ {
              value=$0; sub(/^[^=]*=[[:space:]]*/, "", value); gsub(/["'"'"']/, "", value); print value; exit
            }
          ' "$manifest")"
          [ -n "$package_name" ] || continue
          case " $skipped_packages " in
            *" $package_name "*) ;;
            *) set -- "$@" --package "$package_name" ;;
          esac
        done < <(find . -type f -name Cargo.toml ! -path './target/*' ! -path './.git/*' | sort)

        if [ "$#" -eq 0 ]; then
          echo 'No matching Cargo packages found'
          exit 0
        fi
        "$cargo" {{if .RUST_TOOLCHAIN}}+{{.RUST_TOOLCHAIN}} {{end}}{{.CARGO_SUBCMD}} "$@" \
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
          {{- else}}{{.EXTRA_ARGS}}{{end}}
  _cargo:windows:
    run: once
    internal: true
    platforms: [windows]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$c = (Get-Command cargo -ErrorAction SilentlyContinue).Source; if (-not $c) { $c = Join-Path $env:USERPROFILE '.cargo\bin\cargo.exe' }; $skipPattern='{{default "" .CARGO_SKIP_PATTERN}}'; if (-not $skipPattern) {

          & $c {{if .RUST_TOOLCHAIN}}+{{.RUST_TOOLCHAIN}} {{end}}{{.CARGO_SUBCMD}}
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}};
          exit $LASTEXITCODE
        }; function Get-PackageName([string]$manifest) {

          $inPackage=$false;
          foreach ($line in Get-Content -LiteralPath $manifest) {
            if ($line -match '^\s*\[package\]\s*$') { $inPackage=$true; continue };
            if ($line -match '^\s*\[') { $inPackage=$false };
            if ($inPackage -and $line -match '^\s*name\s*=\s*[''\"]([^''\"]+)[''\"]') { return $Matches[1] };
          };
          return ''
        }; $allFiles=@(Get-ChildItem -Recurse -Filter '*.rs' -File |

          Where-Object { $_.FullName -notmatch '\\target\\|\\.git\\' });
        $retained=@($allFiles | ForEach-Object FullName |

          task --silent --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
            filter ('SKIPFILES_PATTERN=' + $skipPattern));
        $skippedPackages=@{}; foreach ($file in $allFiles) {

          if ($retained -contains $file.FullName) { continue };
          $directory=$file.Directory;
          while ($directory -and -not (Test-Path -LiteralPath (Join-Path $directory.FullName 'Cargo.toml'))) {
            $directory=$directory.Parent
          };
          if ($directory) {
            $name=Get-PackageName (Join-Path $directory.FullName 'Cargo.toml');
            if ($name) { $skippedPackages[$name]=$true }
          }
        }; if ($skippedPackages.Count -eq 0) {

          & $c {{if .RUST_TOOLCHAIN}}+{{.RUST_TOOLCHAIN}} {{end}}{{.CARGO_SUBCMD}}
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}};
          exit $LASTEXITCODE
        }; $packageArgs=@(); Get-ChildItem -Recurse -Filter Cargo.toml -File |

          Where-Object { $_.FullName -notmatch '\\target\\|\\.git\\' } |
          ForEach-Object {
            $name=Get-PackageName $_.FullName;
            if ($name -and -not $skippedPackages.ContainsKey($name)) { $packageArgs += @('--package', $name) }
          };
        if ($packageArgs.Count -eq 0) { Write-Host 'No matching Cargo packages found'; exit 0 }; & $c {{if .RUST_TOOLCHAIN}}+{{.RUST_TOOLCHAIN}} {{end}}{{.CARGO_SUBCMD}} @packageArgs

          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
          {{- else}}{{.EXTRA_ARGS}}{{end}};
        exit $LASTEXITCODE"

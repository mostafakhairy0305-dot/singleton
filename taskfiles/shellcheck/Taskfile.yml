---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
includes:
  skipfiles:
    taskfile: ../internal/skipfiles/Taskfile.yml
    internal: true
vars:
  SHELLCHECK_LINT_SKIP_PATTERN: ""
  EXTRA_ARGS: ""
  TARGETS: ""
  VERSION: ""
tasks:
  default:
    run: once
    desc: Show available ShellCheck automation tasks
    summary: Display the list of available ShellCheck-related tasks defined in this Taskfile.
    cmds:
      - task --list
  lint:
    run: once
    desc: Lint shell scripts with ShellCheck (TARGETS=glob)
    summary: |
      Run shellcheck against TARGETS. When TARGETS is empty, all *.sh and
      *.bash files under the working tree are discovered recursively (excluding .git).
      Pass explicit paths or globs to check specific scripts. Pass EXTRA_ARGS
      for additional flags such as --shell or --severity, or CLI arguments
      after -- to override all variables directly. Auto-installs ShellCheck if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - task: _lint:unix
      - task: _lint:windows
  _lint:unix:
    run: once
    internal: true
    platforms: [darwin, linux]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        skip_pattern='{{if .SHELLCHECK_LINT_SKIP_PATTERN_OVERRIDE}}{{.SHELLCHECK_LINT_SKIP_PATTERN_OVERRIDE}}
        {{- else}}{{.SHELLCHECK_LINT_SKIP_PATTERN}}{{end}}'
        if [ -z "$skip_pattern" ] && [ -n "{{.CLI_ARGS}}" ]; then
          shellcheck {{.CLI_ARGS}} && echo "✅ shellcheck passed" || { echo "❌ shellcheck failed"; exit 1; }
          exit
        fi

        extra="{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
        {{- else}}{{.EXTRA_ARGS}}{{end}} {{.CLI_ARGS}}"
        targets="{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else}}{{.TARGETS}}{{end}}"
        file_list="$(mktemp)"
        trap 'rm -f "$file_list"' EXIT

        if [ -z "$targets" ]; then
          find . -type f \( -name '*.sh' -o -name '*.bash' \) ! -path '*/.git/*' -print0
        else
          for target in $targets; do
            if [ -d "$target" ]; then
              find "$target" -type f \( -name '*.sh' -o -name '*.bash' \) ! -path '*/.git/*' -print0
            elif [ -f "$target" ]; then
              printf '%s\000' "$target"
            fi
          done
        fi | task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
          filter "SKIPFILES_PATTERN=$skip_pattern" >"$file_list"

        if [ ! -s "$file_list" ]; then
          echo "✅ shellcheck passed (no matching shell scripts found)"
          exit 0
        fi

        xargs -0 shellcheck $extra <"$file_list"
        echo "✅ shellcheck passed"
  _lint:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $skipPattern='{{if .SHELLCHECK_LINT_SKIP_PATTERN_OVERRIDE}}{{.SHELLCHECK_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.SHELLCHECK_LINT_SKIP_PATTERN}}{{end}}'; if (-not $skipPattern -and '{{.CLI_ARGS}}') {

          shellcheck {{.CLI_ARGS}}; exit $LASTEXITCODE
        }; $extra='{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}'; $targets='{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else}}{{.TARGETS}}{{end}}'; if (-not $targets) {

          $files = Get-ChildItem -Recurse -Filter '*.sh' -File |
            Where-Object { $_.FullName -notmatch '\\\.git\\' };
        } else {

          $files = @($targets.Split(' ') | ForEach-Object {
            if (Test-Path -LiteralPath $_ -PathType Container) {
              Get-ChildItem -LiteralPath $_ -Recurse -File |
                Where-Object { $_.Extension -in @('.sh', '.bash') -and $_.FullName -notmatch '\\\.git\\' }
            } elseif (Test-Path -LiteralPath $_ -PathType Leaf) {
              Get-Item -LiteralPath $_
            }
          });
        }; $paths = @($files | ForEach-Object FullName |

          task --silent --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
            filter ('SKIPFILES_PATTERN=' + $skipPattern));
        if (-not $paths) { Write-Host 'No matching shell scripts found'; exit 0 }; $arguments = @(); if ($extra) { $arguments += $extra.Split(' ') }; if ('{{.CLI_ARGS}}') { $arguments += '{{.CLI_ARGS}}'.Split(' ') }; shellcheck @arguments @paths; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; Write-Host '✅ shellcheck passed'"
  install:
    run: once
    desc: Install ShellCheck on the current operating system
    summary: |
      Install ShellCheck for the current platform if it is not already available.
      Pass VERSION=x.y.z to pin a specific release; exact availability
      depends on what the platform's package manager/repository carries.
      macOS uses Homebrew to install ShellCheck.
      Linux uses apt-get or dnf depending on the package manager present.
      Windows uses Scoop to install ShellCheck.
    cmds:
      - task: _install:macos
      - task: _install:linux
      - task: _install:windows
  install:undo:
    run: once
    desc: Remove ShellCheck from the current operating system
    summary: |
      Remove ShellCheck for the current platform.
      macOS uses Homebrew to uninstall ShellCheck.
      Linux removes ShellCheck via apt-get or dnf.
      Windows uses Scoop to uninstall ShellCheck.
    aliases:
      - uninstall
    prompt:
      - This will remove ShellCheck from this machine.
      - Continue?
    cmds:
      - task: _install:undo:macos
      - task: _install:undo:linux
      - task: _install:undo:windows
  upgrade:
    run: once
    desc: Upgrade ShellCheck to the latest release
    summary: |
      Upgrade ShellCheck to the latest available release.
      macOS uses brew upgrade shellcheck.
      Linux upgrades ShellCheck via apt-get or dnf.
      Windows uses scoop update shellcheck.
    cmds:
      - task: _upgrade:macos
      - task: _upgrade:linux
      - task: _upgrade:windows
  version:
    run: once
    desc: Show the installed ShellCheck version
    summary: Print the active ShellCheck version via shellcheck --version. Auto-installs ShellCheck if missing.
    deps:
      - install
    cmds:
      - shellcheck --version
  _install:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        command -v shellcheck >/dev/null 2>&1 && { [ -z "{{.VERSION}}" ] || shellcheck --version | grep -Fqx "version: {{.VERSION}}"; }
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to install ShellCheck on macOS. Install it from https://brew.sh and re-run this task.
    cmds:
      - echo 'Installing ShellCheck via Homebrew...'
      - brew install "shellcheck{{if .VERSION}}@{{.VERSION}}{{end}}"
      - echo 'ShellCheck installed.'
  _install:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        command -v shellcheck >/dev/null 2>&1 && { [ -z "{{.VERSION}}" ] || shellcheck --version | grep -Fqx "version: {{.VERSION}}"; }
    cmds:
      - task: _install:linux:apt
      - task: _install:linux:dnf
  _install:linux:apt:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v apt-get >/dev/null 2>&1"
    cmds:
      - echo 'Installing ShellCheck via apt-get...'
      - cmd: apt-get install -y "shellcheck{{if .VERSION}}={{.VERSION}}{{end}}"
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo apt-get install -y "shellcheck{{if .VERSION}}={{.VERSION}}{{end}}"
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'ShellCheck installed.'
  _install:linux:dnf:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v dnf >/dev/null 2>&1"
    cmds:
      - echo 'Installing ShellCheck via dnf...'
      - cmd: dnf install -y "shellcheck{{if .VERSION}}-{{.VERSION}}{{end}}"
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo dnf install -y "shellcheck{{if .VERSION}}-{{.VERSION}}{{end}}"
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'ShellCheck installed.'
  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$shellcheck = Get-Command shellcheck -ErrorAction SilentlyContinue; if (-not $shellcheck) { exit 1 }; $requested = '{{.VERSION}}'; if ([string]::IsNullOrWhiteSpace($requested) -or ((& $shellcheck.Source --version) -match ('(?m)^version: ' + [regex]::Escape($requested) + '$'))) { exit 0 }; exit 1"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command scoop -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Scoop is required to install ShellCheck on Windows. Install it from https://scoop.sh and re-run this task.
    cmds:
      - echo Installing ShellCheck via Scoop...
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop install shellcheck{{if .VERSION}}@{{.VERSION}}{{end}}"
      - echo ShellCheck installed. Restart your terminal if shellcheck is not found.
  _install:undo:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v shellcheck >/dev/null 2>&1"
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to remove ShellCheck on macOS.
    cmds:
      - echo 'Removing ShellCheck via Homebrew...'
      - brew uninstall shellcheck
      - echo 'ShellCheck removed.'
  _install:undo:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v shellcheck >/dev/null 2>&1"
    preconditions:
      - sh: 'test "$(id -u)" -eq 0 || command -v sudo >/dev/null 2>&1'
        msg: sudo is required to remove ShellCheck when not running as root.
    cmds:
      - task: _install:undo:linux:apt
      - task: _install:undo:linux:dnf
  _install:undo:linux:apt:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v apt-get >/dev/null 2>&1"
    cmds:
      - echo 'Removing ShellCheck via apt-get...'
      - cmd: apt-get remove -y shellcheck
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo apt-get remove -y shellcheck
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'ShellCheck removed.'
  _install:undo:linux:dnf:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v dnf >/dev/null 2>&1"
    cmds:
      - echo 'Removing ShellCheck via dnf...'
      - cmd: dnf remove -y shellcheck
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo dnf remove -y shellcheck
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'ShellCheck removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command shellcheck -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing ShellCheck via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop uninstall shellcheck"
      - echo ShellCheck removed.
  _upgrade:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to upgrade ShellCheck on macOS.
    cmds:
      - echo 'Upgrading ShellCheck via Homebrew...'
      - cmd: brew upgrade shellcheck
        if: brew list shellcheck >/dev/null 2>&1
      - cmd: brew install shellcheck
        if: "! brew list shellcheck >/dev/null 2>&1"
      - echo 'ShellCheck upgraded.'
  _upgrade:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v shellcheck >/dev/null 2>&1
        msg: ShellCheck is not installed. Run task install first.
    cmds:
      - task: _upgrade:linux:apt
      - task: _upgrade:linux:dnf
  _upgrade:linux:apt:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v apt-get >/dev/null 2>&1"
    cmds:
      - echo 'Upgrading ShellCheck via apt-get...'
      - cmd: apt-get install -y --only-upgrade shellcheck
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo apt-get install -y --only-upgrade shellcheck
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'ShellCheck upgraded.'
  _upgrade:linux:dnf:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v dnf >/dev/null 2>&1"
    cmds:
      - echo 'Upgrading ShellCheck via dnf...'
      - cmd: dnf upgrade -y shellcheck
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo dnf upgrade -y shellcheck
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'ShellCheck upgraded.'
  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - echo Upgrading ShellCheck via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop update shellcheck"
      - echo ShellCheck upgraded. Restart your terminal if prompted.

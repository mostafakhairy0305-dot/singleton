---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
includes:
  skipfiles:
    taskfile: ../internal/skipfiles/Taskfile.yml
    internal: true
vars:
  ACTIONLINT_LINT_SKIP_PATTERN: ""
  ACTIONLINT_VERSION: "1.7.12"
  ACTIONLINT_EXTRA_ARGS: ""
  ACTIONLINT_TARGETS: ""
tasks:
  default:
    run: once
    desc: Show available actionlint automation tasks
    summary: Display the list of available actionlint-related tasks defined in this Taskfile.
    cmds:
      - task --list
  lint:
    run: once
    desc: Lint GitHub Actions workflow files with actionlint
    summary: |
      Run actionlint against workflow files. When ACTIONLINT_TARGETS is empty
      actionlint automatically discovers all .github/workflows files. Pass
      explicit paths to check specific workflows. Pass ACTIONLINT_EXTRA_ARGS
      for additional flags such as -ignore or -format, or CLI arguments after
      -- to override targets and options. ACTIONLINT_LINT_SKIP_PATTERN remains
      active when CLI arguments are supplied. Auto-installs actionlint if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: |
          skip_pattern='{{if .ACTIONLINT_LINT_SKIP_PATTERN_OVERRIDE}}{{.ACTIONLINT_LINT_SKIP_PATTERN_OVERRIDE}}
          {{- else}}{{.ACTIONLINT_LINT_SKIP_PATTERN}}{{end}}'
          if [ -z "$skip_pattern" ]; then
            actionlint \
              {{if .CLI_ARGS}}{{.CLI_ARGS}} \
              {{else}}{{if .ACTIONLINT_EXTRA_ARGS_OVERRIDE}}{{.ACTIONLINT_EXTRA_ARGS_OVERRIDE}}
              {{- else}}{{.ACTIONLINT_EXTRA_ARGS}}{{end}} \
              {{if .ACTIONLINT_TARGETS_OVERRIDE}}{{.ACTIONLINT_TARGETS_OVERRIDE}}
              {{- else}}{{.ACTIONLINT_TARGETS}}{{end}}{{end}} \
              && echo "✅ actionlint passed" || { echo "❌ actionlint failed"; exit 1; }
            exit
          fi

          file_list="$(mktemp)"
          argument_list="$(mktemp)"
          target_list="$(mktemp)"
          trap 'rm -f "$file_list" "$argument_list" "$target_list"' EXIT
          parse_arguments() {
            while [ "$#" -gt 0 ]; do
              argument="$1"
              shift
              case "$argument" in
                -config-file|-format|-ignore|-pyflakes|-shellcheck|-stdin-filename)
                  printf '%s\000' "$argument" >>"$argument_list"
                  if [ "$#" -gt 0 ]; then
                    printf '%s\000' "$1" >>"$argument_list"
                    shift
                  fi
                  ;;
                -*) printf '%s\000' "$argument" >>"$argument_list" ;;
                *) printf '%s\n' "$argument" >>"$target_list" ;;
              esac
            done
          }
          parse_arguments {{if .ACTIONLINT_EXTRA_ARGS_OVERRIDE}}{{.ACTIONLINT_EXTRA_ARGS_OVERRIDE}}
          {{- else}}{{.ACTIONLINT_EXTRA_ARGS}}{{end}}
          parse_arguments {{.CLI_ARGS}}
          targets='{{if .ACTIONLINT_TARGETS_OVERRIDE}}{{.ACTIONLINT_TARGETS_OVERRIDE}}
          {{- else}}{{.ACTIONLINT_TARGETS}}{{end}}'
          if [ ! -s "$target_list" ]; then
            if [ -n "{{.CLI_ARGS}}" ] || [ -z "$targets" ]; then targets='.github/workflows'; fi
            for target in $targets; do printf '%s\n' "$target" >>"$target_list"; done
          fi
          while IFS= read -r target; do
            if [ -d "$target" ]; then
              find "$target" -type f \( -name '*.yml' -o -name '*.yaml' \) -print0
            elif [ -f "$target" ]; then
              printf '%s\000' "$target"
            fi
          done <"$target_list" |
            task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
              filter "SKIPFILES_PATTERN=$skip_pattern" >"$file_list"
          if [ ! -s "$file_list" ]; then
            echo "✅ actionlint passed (no matching workflows found)"
            exit 0
          fi
          cat "$argument_list" "$file_list" | xargs -0 actionlint \
            && echo "✅ actionlint passed" || { echo "❌ actionlint failed"; exit 1; }
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$skipPattern='{{if .ACTIONLINT_LINT_SKIP_PATTERN_OVERRIDE}}{{.ACTIONLINT_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.ACTIONLINT_LINT_SKIP_PATTERN}}{{end}}'; if (-not $skipPattern) {

            actionlint {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}
              {{if .ACTIONLINT_EXTRA_ARGS_OVERRIDE}}{{.ACTIONLINT_EXTRA_ARGS_OVERRIDE}}
              {{- else}}{{.ACTIONLINT_EXTRA_ARGS}}{{end}}
              {{if .ACTIONLINT_TARGETS_OVERRIDE}}{{.ACTIONLINT_TARGETS_OVERRIDE}}
              {{- else}}{{.ACTIONLINT_TARGETS}}{{end}}{{end}};
            exit $LASTEXITCODE
          }; $toolArguments=[System.Collections.Generic.List[string]]::new(); $targetPaths=[System.Collections.Generic.List[string]]::new(); function Add-ActionlintArguments([string]$Text) {

            $tokens=$Text.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries);
            for ($index=0; $index -lt $tokens.Count; $index++) {
              $argument=$tokens[$index];
              if ($argument -in @('-config-file','-format','-ignore','-pyflakes','-shellcheck','-stdin-filename')) {
                $toolArguments.Add($argument);
                if (($index + 1) -lt $tokens.Count) {
                  $index++;
                  $toolArguments.Add($tokens[$index]);
                }
              } elseif ($argument.StartsWith('-')) {
                $toolArguments.Add($argument)
              } else {
                $targetPaths.Add($argument)
              }
            }
          }; Add-ActionlintArguments '{{if .ACTIONLINT_EXTRA_ARGS_OVERRIDE}}{{.ACTIONLINT_EXTRA_ARGS_OVERRIDE}} {{- else}}{{.ACTIONLINT_EXTRA_ARGS}}{{end}}'; Add-ActionlintArguments '{{.CLI_ARGS}}'; $configuredTargets='{{if .ACTIONLINT_TARGETS_OVERRIDE}}{{.ACTIONLINT_TARGETS_OVERRIDE}} {{- else}}{{.ACTIONLINT_TARGETS}}{{end}}'; if (-not $targetPaths.Count) {

            if ('{{.CLI_ARGS}}' -or -not $configuredTargets) { $configuredTargets='.github/workflows' };
            foreach ($target in $configuredTargets.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)) {
              $targetPaths.Add($target)
            }
          }; $files=@($targetPaths | ForEach-Object {

            if (Test-Path -LiteralPath $_ -PathType Container) {
              Get-ChildItem -LiteralPath $_ -Recurse -File |
                Where-Object { $_.Extension -in @('.yml', '.yaml') }
            } elseif (Test-Path -LiteralPath $_ -PathType Leaf) { Get-Item -LiteralPath $_ }
          }); $paths=@($files | ForEach-Object FullName |

            task --silent --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
              filter ('SKIPFILES_PATTERN=' + $skipPattern));
          if (-not $paths) { Write-Host 'No matching workflows found'; exit 0 }; actionlint @toolArguments @paths; exit $LASTEXITCODE"
        platforms: [windows]
  install:
    run: once
    desc: Install actionlint on the current operating system
    summary: |
      Install actionlint for the current platform if it is not already available.
      macOS uses Homebrew to install actionlint.
      Linux downloads the pinned ACTIONLINT_VERSION binary to /usr/local/bin.
      Windows uses Scoop to install actionlint.
    cmds:
      - task: _install:macos
      - task: _install:linux
      - task: _install:windows
  install:undo:
    run: once
    desc: Remove actionlint from the current operating system
    summary: |
      Remove actionlint for the current platform.
      macOS uses Homebrew to uninstall actionlint.
      Linux removes the binary from /usr/local/bin.
      Windows uses Scoop to uninstall actionlint.
    aliases:
      - uninstall
    prompt:
      - This will remove actionlint from this machine.
      - Continue?
    cmds:
      - task: _install:undo:macos
      - task: _install:undo:linux
      - task: _install:undo:windows
  upgrade:
    run: once
    desc: Upgrade actionlint to the latest release
    summary: |
      Upgrade actionlint to the latest available release.
      macOS uses brew upgrade actionlint.
      Linux re-downloads the pinned ACTIONLINT_VERSION binary, replacing any existing installation.
      Windows uses scoop update actionlint.
    cmds:
      - task: _upgrade:macos
      - task: _upgrade:linux
      - task: _upgrade:windows
  version:
    run: once
    desc: Show the installed actionlint version
    summary: Print the active actionlint version via actionlint --version. Auto-installs actionlint if missing.
    deps:
      - install
    cmds:
      - actionlint --version
  _install:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        command -v actionlint >/dev/null 2>&1 && actionlint --version | grep -Fqx "{{.ACTIONLINT_VERSION}}"
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to install actionlint on macOS. Install it from https://brew.sh and re-run this task.
    cmds:
      - echo 'Installing actionlint via Homebrew...'
      - brew install actionlint
      - echo 'actionlint installed.'
  _install:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      ACTIONLINT_UNAME_ARCH:
        sh: uname -m
      ACTIONLINT_ARCH: >-
        {{if or (eq .ACTIONLINT_UNAME_ARCH "x86_64") (eq .ACTIONLINT_UNAME_ARCH "amd64")}}amd64 {{- else if or (eq .ACTIONLINT_UNAME_ARCH "aarch64") (eq .ACTIONLINT_UNAME_ARCH "arm64")}}arm64 {{- else}}{{.ACTIONLINT_UNAME_ARCH}}{{end}}
      ACTIONLINT_ARCHIVE: "/tmp/taskotter-actionlint-{{.ACTIONLINT_VERSION}}.tar.gz"
      ACTIONLINT_TMP_DIR: "/tmp/taskotter-actionlint-{{.ACTIONLINT_VERSION}}"
    status:
      - >-
        command -v actionlint >/dev/null 2>&1 && actionlint --version | grep -Fqx "{{.ACTIONLINT_VERSION}}"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download actionlint.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract actionlint.
      - sh: command -v install >/dev/null 2>&1
        msg: install is required to place the actionlint binary.
      - sh: >-
          [ "{{.ACTIONLINT_ARCH}}" = "amd64" ] || [ "{{.ACTIONLINT_ARCH}}" = "arm64" ]
        msg: Unsupported Linux architecture. Only x86_64 and aarch64 are supported.
    cmds:
      - echo 'Installing actionlint v{{.ACTIONLINT_VERSION}} for Linux ({{.ACTIONLINT_ARCH}})...'
      - mkdir -p "{{.ACTIONLINT_TMP_DIR}}"
      - >-
        archive_url="https://github.com/rhysd/actionlint/releases/download/v{{.ACTIONLINT_VERSION}}"; archive_url="${archive_url}/actionlint_{{.ACTIONLINT_VERSION}}_linux_{{.ACTIONLINT_ARCH}}.tar.gz"; curl -fsSL -o "{{.ACTIONLINT_ARCHIVE}}" "$archive_url"
      - tar -xzf "{{.ACTIONLINT_ARCHIVE}}" -C "{{.ACTIONLINT_TMP_DIR}}"
      - cmd: >-
          install -m 0755 "$(find "{{.ACTIONLINT_TMP_DIR}}" -type f -name actionlint -print -quit)" /usr/local/bin/actionlint
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: >-
          sudo install -m 0755 "$(find "{{.ACTIONLINT_TMP_DIR}}" -type f -name actionlint -print -quit)" /usr/local/bin/actionlint
        if: '[ "$(id -u)" -ne 0 ]'
      - rm -rf "{{.ACTIONLINT_ARCHIVE}}" "{{.ACTIONLINT_TMP_DIR}}"
      - echo 'actionlint installed.'
  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$actionlint = Get-Command actionlint -ErrorAction SilentlyContinue; if ($actionlint -and ((& $actionlint.Source --version) -eq '{{.ACTIONLINT_VERSION}}')) { exit 0 }; exit 1"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command scoop -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Scoop is required to install actionlint on Windows. Install it from https://scoop.sh and re-run this task.
    cmds:
      - echo Installing actionlint via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop install actionlint"
      - echo actionlint installed. Restart your terminal if actionlint is not found.
  _install:undo:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v actionlint >/dev/null 2>&1"
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to remove actionlint on macOS.
    cmds:
      - echo 'Removing actionlint via Homebrew...'
      - brew uninstall actionlint
      - echo 'actionlint removed.'
  _install:undo:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v actionlint >/dev/null 2>&1"
    cmds:
      - echo 'Removing actionlint...'
      - cmd: rm -f /usr/local/bin/actionlint
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo rm -f /usr/local/bin/actionlint
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'actionlint removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command actionlint -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing actionlint via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop uninstall actionlint"
      - echo actionlint removed.
  _upgrade:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to upgrade actionlint on macOS.
    cmds:
      - echo 'Upgrading actionlint via Homebrew...'
      - cmd: brew upgrade actionlint
        if: brew list actionlint >/dev/null 2>&1
      - cmd: brew install actionlint
        if: "! brew list actionlint >/dev/null 2>&1"
      - echo 'actionlint upgraded.'
  _upgrade:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      ACTIONLINT_UNAME_ARCH:
        sh: uname -m
      ACTIONLINT_ARCH: >-
        {{if or (eq .ACTIONLINT_UNAME_ARCH "x86_64") (eq .ACTIONLINT_UNAME_ARCH "amd64")}}amd64 {{- else if or (eq .ACTIONLINT_UNAME_ARCH "aarch64") (eq .ACTIONLINT_UNAME_ARCH "arm64")}}arm64 {{- else}}{{.ACTIONLINT_UNAME_ARCH}}{{end}}
      ACTIONLINT_ARCHIVE: "/tmp/taskotter-actionlint-{{.ACTIONLINT_VERSION}}.tar.gz"
      ACTIONLINT_TMP_DIR: "/tmp/taskotter-actionlint-{{.ACTIONLINT_VERSION}}"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download actionlint.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract actionlint.
      - sh: command -v install >/dev/null 2>&1
        msg: install is required to place the actionlint binary.
      - sh: >-
          [ "{{.ACTIONLINT_ARCH}}" = "amd64" ] || [ "{{.ACTIONLINT_ARCH}}" = "arm64" ]
        msg: Unsupported Linux architecture. Only x86_64 and aarch64 are supported.
    cmds:
      - echo 'Upgrading actionlint to v{{.ACTIONLINT_VERSION}} for Linux ({{.ACTIONLINT_ARCH}})...'
      - mkdir -p "{{.ACTIONLINT_TMP_DIR}}"
      - >-
        archive_url="https://github.com/rhysd/actionlint/releases/download/v{{.ACTIONLINT_VERSION}}"; archive_url="${archive_url}/actionlint_{{.ACTIONLINT_VERSION}}_linux_{{.ACTIONLINT_ARCH}}.tar.gz"; curl -fsSL -o "{{.ACTIONLINT_ARCHIVE}}" "$archive_url"
      - tar -xzf "{{.ACTIONLINT_ARCHIVE}}" -C "{{.ACTIONLINT_TMP_DIR}}"
      - cmd: >-
          install -m 0755 "$(find "{{.ACTIONLINT_TMP_DIR}}" -type f -name actionlint -print -quit)" /usr/local/bin/actionlint
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: >-
          sudo install -m 0755 "$(find "{{.ACTIONLINT_TMP_DIR}}" -type f -name actionlint -print -quit)" /usr/local/bin/actionlint
        if: '[ "$(id -u)" -ne 0 ]'
      - rm -rf "{{.ACTIONLINT_ARCHIVE}}" "{{.ACTIONLINT_TMP_DIR}}"
      - echo 'actionlint upgraded.'
  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - echo Upgrading actionlint via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop update actionlint"
      - echo actionlint upgraded. Restart your terminal if prompted.

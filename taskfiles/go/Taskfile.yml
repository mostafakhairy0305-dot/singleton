---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
includes:
  skipfiles:
    taskfile: ../internal/skipfiles/Taskfile.yml
    internal: true
vars:
  INSTALL_DIR_UNIX: "/usr/local"
  GO_ROOT_UNIX: "{{.INSTALL_DIR_UNIX}}/go"
  GO_BIN_UNIX: "{{.GO_ROOT_UNIX}}/bin"
  GO_CMD_UNIX: "{{.GO_BIN_UNIX}}/go"
  GO_VERSION_URL: https://go.dev/VERSION?m=text
  GO_DOWNLOAD_BASE_URL: https://go.dev/dl
  GO_VERSION: ""
  GOLANGCI_LINT_VERSION: ""
  GOVULNCHECK_VERSION: ""
  GOSEC_VERSION: ""
  GO_FMT_SKIP_PATTERN: ""
  GO_LINT_SKIP_PATTERN: ""
  GO_COVER_PROFILE: ""
  GO_FUZZTIME: ""
  # Formatter selection shared by every golangci-lint fmt invocation (both the
  # skip-pattern and plain paths, on Unix and Windows). Kept in one place so the
  # four call sites cannot drift apart.
  GO_FMT_FORMATTER_FLAGS: >-
    -E gci -E gofmt -E gofumpt -E goimports -E golines -E swaggo
  GLOBAL_GO_BIN:
    sh: |
      gobin="${GOBIN:-}"
      if [ -z "$gobin" ] && command -v go >/dev/null 2>&1; then
        gobin="$(go env GOBIN)"
      fi
      if [ -z "$gobin" ]; then
        gopath="${GOPATH:-}"
        if [ -z "$gopath" ] && command -v go >/dev/null 2>&1; then
          gopath="$(go env GOPATH)"
        fi
        gobin="${gopath:-$HOME/go}/bin"
      fi
      printf '%s' "$gobin"
tasks:
  default:
    run: once
    desc: Show available Go automation tasks
    summary: Display the list of available Go-related tasks defined in this Taskfile.
    cmds:
      - task --list
  install:
    run: once
    desc: Install Go on the current operating system
    summary: |
      Install GO_VERSION for the current platform, defaulting to the latest
      stable release. macOS uses Homebrew for latest or the official package
      for an explicit version. Linux uses the official tarball and Windows
      uses the official MSI.
    cmds:
      - task: _install:macos:brew
      - task: _install:macos:pkg
      - task: _install:linux:tarball
      - task: _install:windows:msi
      - task: _shell:setup:linux
  install:undo:
    run: once
    desc: Remove Go from the current operating system
    summary: |
      Remove the Go toolchain for the current platform.
      macOS uses Homebrew if Go was installed that way, otherwise removes
      /usr/local/go directly (the official package installer's location).
      Linux removes INSTALL_DIR_UNIX/go (default /usr/local/go).
      Windows uses the Programs and Features uninstaller via PowerShell.
    aliases:
      - uninstall
    prompt:
      - This will remove Go from this machine.
      - Continue?
    cmds:
      - task: _install:undo:macos
      - task: _install:undo:linux
      - task: _install:undo:windows
  install:golangci-lint:
    run: once
    desc: Install golangci-lint globally
    summary: Install GOLANGCI_LINT_VERSION, defaulting to latest, into the global Go bin.
    deps:
      - install
    cmds:
      - >-
        GOBIN="{{.GLOBAL_GO_BIN}}" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{default "latest" .GOLANGCI_LINT_VERSION}}
    status:
      - >-
        test -x "{{.GLOBAL_GO_BIN}}/golangci-lint" && { test -z "{{.GOLANGCI_LINT_VERSION}}" || test "{{.GOLANGCI_LINT_VERSION}}" = "latest" || go version -m "{{.GLOBAL_GO_BIN}}/golangci-lint" | awk -v want="{{.GOLANGCI_LINT_VERSION}}" '$1 == "mod" && $3 == want { found = 1 } END { exit !found }'; }
  install:govulncheck:
    run: once
    desc: Install govulncheck globally
    summary: Install GOVULNCHECK_VERSION, defaulting to latest, into the global Go bin.
    deps:
      - install
    cmds:
      - >-
        GOBIN="{{.GLOBAL_GO_BIN}}" go install golang.org/x/vuln/cmd/govulncheck@{{default "latest" .GOVULNCHECK_VERSION}}
    status:
      - >-
        test -x "{{.GLOBAL_GO_BIN}}/govulncheck" && { test -z "{{.GOVULNCHECK_VERSION}}" || test "{{.GOVULNCHECK_VERSION}}" = "latest" || go version -m "{{.GLOBAL_GO_BIN}}/govulncheck" | awk -v want="{{.GOVULNCHECK_VERSION}}" '$1 == "mod" && $3 == want { found = 1 } END { exit !found }'; }
  install:gosec:
    run: once
    desc: Install gosec globally
    summary: Install GOSEC_VERSION, defaulting to latest, into the global Go bin.
    deps:
      - install
    cmds:
      - >-
        GOBIN="{{.GLOBAL_GO_BIN}}" go install github.com/securego/gosec/v2/cmd/gosec@{{default "latest" .GOSEC_VERSION}}
    status:
      - >-
        test -x "{{.GLOBAL_GO_BIN}}/gosec" && { test -z "{{.GOSEC_VERSION}}" || test "{{.GOSEC_VERSION}}" = "latest" || go version -m "{{.GLOBAL_GO_BIN}}/gosec" | awk -v want="{{.GOSEC_VERSION}}" '$1 == "mod" && $3 == want { found = 1 } END { exit !found }'; }
  fmt:
    run: once
    desc: Format Go files with golangci-lint formatters
    summary: |
      Rewrite Go files under the current directory with golangci-lint's Go
      formatters. Set GO_FMT_SKIP_PATTERN to a shell-style path glob for files
      to skip. Pass CLI arguments after -- to override the default target.
    cmds:
      - task: golangci-lint:fmt
  fmt:check:
    run: once
    desc: Check Go file formatting with golangci-lint formatters
    summary: |
      Check Go files under the current directory with golangci-lint's Go
      formatters without modifying them. Pass CLI arguments after -- to
      override the default target. Set GO_FMT_SKIP_PATTERN to a shell-style
      path glob for files to skip. Use fmt to apply fixes.
    deps:
      - golangci-lint:fmt:check
  lint:
    run: once
    desc: Run all Go lint and security checks
    summary: |
      Run golangci-lint, golangci-lint formatters, govulncheck, and gosec.
      Set GO_LINT_SKIP_PATTERN to a shell-style path glob for files that lint
      and security analysis should skip.
    deps:
      - golangci-lint:lint
      - golangci-lint:fmt:check
      - govulncheck:lint
      - gosec:lint
  lint:fix:
    run: once
    desc: Auto-fix Go lint and formatting issues
    summary: |
      Run golangci-lint with --fix, then format Go files with golangci-lint
      formatters. Set GO_LINT_SKIP_PATTERN to a shell-style path glob for files
      that golangci-lint must not modify. Pass CLI arguments after -- to
      override the default target.
    cmds:
      - task: golangci-lint:lint:fix
      - task: fmt
  golangci-lint:lint:
    run: once
    desc: Lint Go packages with golangci-lint
    summary: |
      Run golangci-lint against all Go packages by default. Set
      GO_LINT_SKIP_PATTERN to a shell-style path glob for files to skip. Pass
      CLI arguments after -- to override the default ./... target.
      Auto-installs golangci-lint if missing.
    deps:
      - install:golangci-lint
    cmds:
      - task: _golangci-lint:lint
        vars:
          GO_LINT_FIX: ""
          GO_LINT_ARGS: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}}"
  golangci-lint:lint:fix:
    run: once
    desc: Auto-fix Go lint issues with golangci-lint
    summary: |
      Run golangci-lint with --fix against all Go packages by default. Set
      GO_LINT_SKIP_PATTERN to a shell-style path glob for files that must not
      be modified. Pass CLI arguments after -- to override the default ./...
      target. Auto-installs golangci-lint if missing.
    deps:
      - install:golangci-lint
    cmds:
      - task: _golangci-lint:lint
        vars:
          GO_LINT_FIX: "--fix"
          GO_LINT_ARGS: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}}"
  _golangci-lint:lint:
    run: once
    internal: true
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - cmd: |
          skip_pattern='{{if .GO_LINT_SKIP_PATTERN_OVERRIDE}}{{.GO_LINT_SKIP_PATTERN_OVERRIDE}}
          {{- else}}{{.GO_LINT_SKIP_PATTERN}}{{end}}'
          if [ -z "$skip_pattern" ]; then
            "{{.GLOBAL_GO_BIN}}/golangci-lint" run {{.GO_LINT_FIX}} {{.GO_LINT_ARGS}}
            exit
          fi

          config_path="$("{{.GLOBAL_GO_BIN}}/golangci-lint" config path 2>/dev/null || true)"
          config_dir=.
          if [ -n "$config_path" ]; then
            config_dir="$(dirname "$config_path")"
          fi

          # The overlay lands inside the user's config directory, so it must be
          # removed on every exit path -- including an interrupt. The Windows
          # branch below relies on try/finally for the same reason.
          overlay_temp="$(mktemp "$config_dir/.golangci-taskotter.XXXXXX")"
          overlay_config="${overlay_temp}.yml"
          trap 'rm -f "$overlay_temp" "$overlay_config"' EXIT INT TERM
          mv "$overlay_temp" "$overlay_config"
          if ! task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
            prepare-overlay \
            SKIPFILES_TOOL=golangci \
            "SKIPFILES_SOURCE_CONFIG=$config_path" \
            "SKIPFILES_OUTPUT=$overlay_config" \
            "SKIPFILES_PATTERN=$skip_pattern"; then
            exit 1
          fi

          lint_status=0
          "{{.GLOBAL_GO_BIN}}/golangci-lint" run \
            {{.GO_LINT_FIX}} \
            {{.GO_LINT_ARGS}} \
            --config "$overlay_config" || lint_status=$?
          exit "$lint_status"
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $skipPattern = '{{if .GO_LINT_SKIP_PATTERN_OVERRIDE}}{{.GO_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.GO_LINT_SKIP_PATTERN}}{{end}}'; if (-not $skipPattern) {


            & '{{.GLOBAL_GO_BIN}}/golangci-lint' run
              {{.GO_LINT_FIX}}
              {{.GO_LINT_ARGS}};
            exit $LASTEXITCODE;
          }; $configPath = (& '{{.GLOBAL_GO_BIN}}/golangci-lint' config path 2>$null | Select-Object -First 1); if ($LASTEXITCODE -ne 0) {


            $configPath = '';
          }; if ($configPath) {


            $configPath = (Resolve-Path -LiteralPath $configPath).Path;
            $configDir = Split-Path -Parent $configPath;
          } else {


            $configDir = (Get-Location).Path;
          }; $overlayConfig = Join-Path $configDir ('.golangci-taskotter.' + [Guid]::NewGuid().ToString('N') + '.yml'); try {


            & task --silent --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
              prepare-overlay
              'SKIPFILES_TOOL=golangci'
              "SKIPFILES_SOURCE_CONFIG=$configPath"
              "SKIPFILES_OUTPUT=$overlayConfig"
              "SKIPFILES_PATTERN=$skipPattern";
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE;
            };
            & '{{.GLOBAL_GO_BIN}}/golangci-lint' run
              {{.GO_LINT_FIX}}
              {{.GO_LINT_ARGS}}
              --config $overlayConfig;
            $exitCode = $LASTEXITCODE;
          } finally {


            Remove-Item -LiteralPath $overlayConfig -Force -ErrorAction SilentlyContinue;
          }; exit $exitCode"
        platforms: [windows]
  golangci-lint:fmt:
    run: once
    desc: Format Go files with golangci-lint formatters
    summary: |
      Rewrite Go files with golangci-lint's gci, gofmt, gofumpt, goimports,
      golines, and swaggo formatters. Set GO_FMT_SKIP_PATTERN to a shell-style
      path glob for files to skip. Pass CLI arguments after -- to override the
      default target. Auto-installs golangci-lint if missing.
    deps:
      - install:golangci-lint
    cmds:
      - task: _golangci-lint:fmt
        vars:
          GO_FMT_DIFF: ""
          GO_FMT_TARGETS: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}.{{end}}"
  golangci-lint:fmt:check:
    run: once
    desc: Check Go formatting with golangci-lint formatters
    summary: |
      Check Go files with golangci-lint's gci, gofmt, gofumpt, goimports,
      golines, and swaggo formatters by printing diffs instead of rewriting
      files. Set GO_FMT_SKIP_PATTERN to a shell-style path glob for files to
      skip. Pass CLI arguments after -- to override the default target.
      Auto-installs golangci-lint if missing.
    deps:
      - install:golangci-lint
    cmds:
      - task: _golangci-lint:fmt
        vars:
          GO_FMT_DIFF: "--diff"
          GO_FMT_TARGETS: "{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}.{{end}}"
  _golangci-lint:fmt:
    run: once
    internal: true
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - cmd: |
          skip_pattern='{{if .GO_FMT_SKIP_PATTERN_OVERRIDE}}{{.GO_FMT_SKIP_PATTERN_OVERRIDE}}
          {{- else}}{{.GO_FMT_SKIP_PATTERN}}{{end}}'
          if [ -z "$skip_pattern" ]; then
            "{{.GLOBAL_GO_BIN}}/golangci-lint" fmt \
              {{.GO_FMT_DIFF}} \
              {{.GO_FMT_FORMATTER_FLAGS}} \
              {{.GO_FMT_TARGETS}}
            exit
          fi

          file_list="$(mktemp)"
          trap 'rm -f "$file_list"' EXIT
          set --
          for target in {{.GO_FMT_TARGETS}}; do
            target="${target%...}"
            target="${target%/}"
            if [ -z "$target" ]; then
              target=.
            fi
            set -- "$@" "$target"
          done

          for target in "$@"; do
            if [ -d "$target" ]; then
              find "$target" \
                -type f \
                -name '*.go' \
                ! -path '*/node_modules/*' \
                ! -path '*/testdata/*' \
                ! -path '*/vendor/*' \
                -print0
            elif [ -f "$target" ]; then
              printf '%s\000' "$target"
            fi
          done | task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
            filter "SKIPFILES_PATTERN=$skip_pattern" >"$file_list"

          if [ ! -s "$file_list" ]; then
            echo 'No matching Go files found'
            exit 0
          fi

          xargs -0 "{{.GLOBAL_GO_BIN}}/golangci-lint" fmt \
              {{.GO_FMT_DIFF}} \
              {{.GO_FMT_FORMATTER_FLAGS}} <"$file_list"
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $skipPattern = '{{if .GO_FMT_SKIP_PATTERN_OVERRIDE}}{{.GO_FMT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.GO_FMT_SKIP_PATTERN}}{{end}}'; if (-not $skipPattern) {


            & '{{.GLOBAL_GO_BIN}}/golangci-lint' fmt
              {{.GO_FMT_DIFF}}
              {{.GO_FMT_FORMATTER_FLAGS}}
              {{.GO_FMT_TARGETS}};
            exit $LASTEXITCODE;
          }; $targets = '{{.GO_FMT_TARGETS}}' -split '\s+'; $files = @($targets | ForEach-Object {


            $target = $_ -replace '\.\.\.$', '';
            $target = $target.TrimEnd('/').TrimEnd('\');
            if (-not $target) { $target = '.' };
            if (Test-Path -LiteralPath $target -PathType Leaf) {
              Get-Item -LiteralPath $target;
            } else {
              Get-ChildItem -LiteralPath $target -Recurse -Filter '*.go' -File;
            };
          } | Where-Object {


            $path = [string](Resolve-Path -LiteralPath $_.FullName -Relative);
            $path = $path.Replace('\', '/');
            $path -notlike '*/node_modules/*' -and
              $path -notlike '*/testdata/*' -and
              $path -notlike '*/vendor/*';
          } | ForEach-Object FullName |


            task --silent --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
              filter ('SKIPFILES_PATTERN=' + $skipPattern));
          if ($files.Count -gt 0) {


            & '{{.GLOBAL_GO_BIN}}/golangci-lint' fmt
              {{.GO_FMT_DIFF}}
              {{.GO_FMT_FORMATTER_FLAGS}}
              @files;
            exit $LASTEXITCODE;
          }"
        platforms: [windows]
  govulncheck:lint:
    run: once
    desc: Scan Go packages with govulncheck
    summary: |
      Scan all Go packages for known vulnerabilities by default. Pass CLI
      arguments after -- to override the default ./... target. Auto-installs
      govulncheck if missing. Packages containing files matched by
      GO_LINT_SKIP_PATTERN are omitted.
    deps:
      - install:govulncheck
    cmds:
      - task: _go:package-analysis
        vars:
          GO_ANALYSIS_BINARY: "{{.GLOBAL_GO_BIN}}/govulncheck"
          GO_ANALYSIS_PREFIX_ARGS: ""
  gosec:lint:
    run: once
    desc: Scan Go packages with gosec
    summary: |
      Scan all Go packages for security issues by default. Pass CLI arguments
      after -- to override the default ./... target. Auto-installs gosec if
      missing. Packages containing files matched by GO_LINT_SKIP_PATTERN are
      omitted.
    deps:
      - install:gosec
    cmds:
      - task: _go:package-analysis
        vars:
          GO_ANALYSIS_BINARY: "{{.GLOBAL_GO_BIN}}/gosec"
          GO_ANALYSIS_PREFIX_ARGS: "-exclude-generated"
  _go:package-analysis:
    internal: true
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - cmd: |
          skip_pattern='{{if .GO_LINT_SKIP_PATTERN_OVERRIDE}}{{.GO_LINT_SKIP_PATTERN_OVERRIDE}}
          {{- else}}{{.GO_LINT_SKIP_PATTERN}}{{end}}'
          if [ -z "$skip_pattern" ]; then
            "{{.GO_ANALYSIS_BINARY}}" {{.GO_ANALYSIS_PREFIX_ARGS}} \
              {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}}
            exit
          fi
          targets=''
          options=''
          for argument in {{.CLI_ARGS}}; do
            case "$argument" in
              .|*/*|*\\*|*...) targets="$targets $argument" ;;
              *) options="$options $argument" ;;
            esac
          done
          [ -n "$targets" ] || targets='./...'
          package_list="$(mktemp)"
          trap 'rm -f "$package_list"' EXIT
          export SKIPFILES_PATTERN="$skip_pattern"
          export SKIPFILES_GO_TARGETS="$targets"
          # Propagate an enumeration failure instead of letting it look like an
          # empty package set: `go list` exits non-zero when a package does not
          # compile, and reporting success there would silently skip the scan.
          enumerate_status=0
          task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" \
            go-packages >"$package_list" || enumerate_status=$?
          if [ "$enumerate_status" -ne 0 ]; then
            echo 'Failed to enumerate Go packages' >&2
            exit "$enumerate_status"
          fi
          if [ ! -s "$package_list" ]; then
            echo 'No matching Go packages found'
            exit 0
          fi
          xargs -0 "{{.GO_ANALYSIS_BINARY}}" {{.GO_ANALYSIS_PREFIX_ARGS}} $options <"$package_list"
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$skipPattern='{{if .GO_LINT_SKIP_PATTERN_OVERRIDE}}{{.GO_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.GO_LINT_SKIP_PATTERN}}{{end}}'; if (-not $skipPattern) {


            & '{{.GO_ANALYSIS_BINARY}}' {{.GO_ANALYSIS_PREFIX_ARGS}}
              {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}};
            exit $LASTEXITCODE
          }; $targets=@(); $options=@(); foreach ($argument in '{{.CLI_ARGS}}'.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)) {


            if ($argument -eq '.' -or $argument.Contains('/') -or
                $argument.Contains('\') -or $argument.EndsWith('...')) {
              $targets += $argument
            } else { $options += $argument }
          }; if (-not $targets) { $targets=@('./...') }; $env:SKIPFILES_PATTERN = $skipPattern; $env:SKIPFILES_GO_TARGETS = $targets -join ' '; $packages=@(& task --silent


            --taskfile '{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml'
            go-packages);
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; if (-not $packages) { Write-Host 'No matching Go packages found'; exit 0 }; & '{{.GO_ANALYSIS_BINARY}}' {{.GO_ANALYSIS_PREFIX_ARGS}} @options @packages; exit $LASTEXITCODE"
        platforms: [windows]
  upgrade:
    run: once
    desc: Upgrade Go to the selected or latest stable release
    summary: |
      Upgrade Go to GO_VERSION, defaulting to the latest stable release.
      macOS uses Homebrew for latest or the official package for an explicit
      version. Linux uses the official tarball and Windows uses the official
      MSI.
    cmds:
      - task: _upgrade:macos:brew
      - task: _install:macos:pkg
      - task: _install:linux:tarball
        vars:
          FORCE: "true"
      - task: _install:windows:msi
        vars:
          FORCE: "true"
      - task: _shell:setup:linux
        vars:
          FORCE: "true"
  version:
    run: once
    desc: Show the installed Go version
    summary: Print the active Go toolchain version via `go version`. Auto-installs Go if missing.
    deps:
      - install
    cmds:
      - task: _version:unix
      - task: _version:windows
  which:
    run: once
    desc: Show the path to the Go binary
    summary: Print the Go binary resolved from PATH, falling back to GO_CMD_UNIX on Linux. Auto-installs Go if missing.
    deps:
      - install
    cmds:
      - task: _which:unix
      - task: _which:windows
  verify:
    run: once
    desc: Verify the Go installation and environment
    summary: |
      Check that Go is installed, print the active version, and show the
      resolved GOROOT and GOPATH values for quick installation diagnostics.
      Auto-installs Go if missing.
    deps:
      - install
    cmds:
      - task: _verify:unix
      - task: _verify:windows
  test:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Run Go unit tests
    summary: |
      Run `go test` against all Go packages by default. Pass CLI arguments after
      -- to override the default ./... target or add flags, for example:
      `task go:test -- -race -run TestName ./internal/...`.
    cmds:
      - go test {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}}
  bench:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Run Go benchmarks
    summary: |
      Run `go test` benchmarks (-bench .) with memory statistics and no
      unit-test execution (-run '^$'). Pass CLI arguments after -- to override
      the default ./... target or the -bench pattern, for example:
      `task go:bench -- -bench BenchmarkName ./internal/parser`.
    cmds:
      - go test -run '^$' -bench . -benchmem {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}}
  fuzz:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Run a Go fuzz target
    summary: |
      Run a Go fuzz target for a bounded duration (GO_FUZZTIME, default 30s). Go
      fuzzes a single target in one package per run, so pass the -fuzz pattern
      and package after --, for example:
      `task go:fuzz -- -fuzz FuzzName ./internal/parser`.
    vars:
      GO_FUZZ_TIME: '{{if .GO_FUZZTIME}}{{.GO_FUZZTIME}}{{else}}30s{{end}}'
    cmds:
      - go test -run '^$' -fuzztime '{{.GO_FUZZ_TIME}}' {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}-fuzz . .{{end}}
  coverage:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Report Go test coverage
    summary: |
      Run `go test` with coverage across all Go packages, writing the profile to
      GO_COVER_PROFILE (default coverage.out) and printing packages containing
      executable statements from lowest to highest coverage. Pass CLI arguments
      after -- to override the default ./... target.
    vars:
      GO_COVER_OUT: '{{if .GO_COVER_PROFILE}}{{.GO_COVER_PROFILE}}{{else}}coverage.out{{end}}'
    cmds:
      - cmd: |
          coverage_log="$(mktemp)"
          coverage_rows="$(mktemp)"
          coverage_sorted="$(mktemp)"
          trap 'rm -f "$coverage_log" "$coverage_rows" "$coverage_sorted"' EXIT

          coverage_status=0
          go test -covermode atomic -coverprofile '{{.GO_COVER_OUT}}' \
            {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}} \
            >"$coverage_log" 2>&1 || coverage_status=$?
          if [ "$coverage_status" -ne 0 ]; then
            cat "$coverage_log"
            exit "$coverage_status"
          fi

          awk '
            NR == 1 { next }
            {
              file = $1
              sub(/:[[:digit:]]+\.[[:digit:]]+,[[:digit:]]+\.[[:digit:]]+$/, "", file)
              slash = 0
              for (position = length(file); position > 0; position--) {
                if (substr(file, position, 1) == "/") {
                  slash = position
                  break
                }
              }
              if (slash == 0) { next }

              package = substr(file, 1, slash - 1)
              statements = $2 + 0
              total[package] += statements
              if (($3 + 0) > 0) { covered[package] += statements }
            }
            END {
              for (package in total) {
                if (total[package] == 0) { continue }
                percentage = 100 * covered[package] / total[package]
                printf "%.12f %.1f %s\n", percentage, percentage, package
              }
            }
          ' '{{.GO_COVER_OUT}}' >"$coverage_rows"
          LC_ALL=C sort -k1,1n -k3,3 "$coverage_rows" >"$coverage_sorted"
          awk '{ printf "%5.1f%%  %s\n", $2, $3 }' "$coverage_sorted"
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $coverageLog=[System.IO.Path]::GetTempFileName(); try {


            & go test -covermode atomic -coverprofile '{{.GO_COVER_OUT}}'
              {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}./...{{end}}
              *> $coverageLog;
            $coverageStatus=$LASTEXITCODE;
            if ($coverageStatus -ne 0) {
              Get-Content -LiteralPath $coverageLog;
              exit $coverageStatus;
            };
            $packages=@{};
            Get-Content -LiteralPath '{{.GO_COVER_OUT}}' |
              Select-Object -Skip 1 |
              ForEach-Object {
                if ($_ -notmatch
                    '^(?<file>.+):\d+\.\d+,\d+\.\d+\s+(?<statements>\d+)\s+(?<count>\d+)$') {
                  return;
                };
                $file=$Matches['file'].Replace('\', '/');
                $slash=$file.LastIndexOf('/');
                if ($slash -lt 1) { return };
                $package=$file.Substring(0, $slash);
                if (-not $packages.ContainsKey($package)) {
                  $packages[$package]=[PSCustomObject]@{
                    Package=$package; Covered=[int64]0; Total=[int64]0
                  };
                };
                $statements=[int64]$Matches['statements'];
                $packages[$package].Total += $statements;
                if ([int64]$Matches['count'] -gt 0) {
                  $packages[$package].Covered += $statements;
                };
              };
            $packages.Values |
              Where-Object { $_.Total -gt 0 } |
              ForEach-Object {
                [PSCustomObject]@{
                  Package=$_.Package;
                  Percentage=100.0 * $_.Covered / $_.Total
                };
              } |
              Sort-Object Percentage, Package |
              ForEach-Object {
                $percentage=$_.Percentage.ToString(
                  'F1', [System.Globalization.CultureInfo]::InvariantCulture
                ).PadLeft(5);
                Write-Output ($percentage + '%  ' + $_.Package);
              };
          } finally {


            Remove-Item -LiteralPath $coverageLog -Force -ErrorAction SilentlyContinue;
          }"
        platforms: [windows]
  _install:macos:brew:
    run: once
    internal: true
    desc: Install Go on macOS using Homebrew
    summary: Run `brew install go` on macOS when GO_VERSION is not set.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '[ -n "{{.GO_VERSION}}" ] || command -v go >/dev/null 2>&1'
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to install Go on macOS. Install it from https://brew.sh and re-run this task.
    cmds:
      - echo 'Installing Go via Homebrew...'
      - brew update
      - brew install go
      - echo 'Go installed successfully.'
  _upgrade:macos:brew:
    run: once
    internal: true
    desc: Upgrade Go on macOS using Homebrew
    summary: Upgrade Go through Homebrew when GO_VERSION is not set.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - test -n "{{.GO_VERSION}}"
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to upgrade Go on macOS. Install it from https://brew.sh and re-run this task.
    cmds:
      - echo 'Upgrading Go via Homebrew...'
      - brew update
      - |
        if brew list go >/dev/null 2>&1; then
          brew upgrade go
        else
          brew install go
        fi
  _install:macos:pkg:
    run: once
    internal: true
    desc: Install an explicit Go version on macOS
    summary: Download and install the official GO_VERSION package on macOS.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    vars:
      GO_DARWIN_UNAME_ARCH:
        sh: uname -m
      GO_DARWIN_ARCH: >-
        {{if or (eq .GO_DARWIN_UNAME_ARCH "arm64") (eq .GO_DARWIN_UNAME_ARCH "aarch64")}}arm64 {{- else if or (eq .GO_DARWIN_UNAME_ARCH "x86_64") (eq .GO_DARWIN_UNAME_ARCH "amd64")}}amd64 {{- else}}{{.GO_DARWIN_UNAME_ARCH}}{{end}}
      GO_DARWIN_ARCH_SUPPORTED: >-
        {{if or (eq .GO_DARWIN_ARCH "arm64") (eq .GO_DARWIN_ARCH "amd64")}}true {{- else}}false{{end}}
    status:
      - >-
        [ -z "{{.GO_VERSION}}" ] || { [ "{{default "false" .FORCE}}" != "true" ] && test -x "{{.GO_CMD_UNIX}}" && [ "$("{{.GO_CMD_UNIX}}" version | awk '{print $3}')" = "{{.GO_VERSION}}" ]; }
    preconditions:
      - sh: 'case "{{.GO_VERSION}}" in ""|go*) exit 0 ;; *) exit 1 ;; esac'
        msg: GO_VERSION must use the official Go release format, for example go1.26.2.
      - sh: '[ "{{.GO_DARWIN_ARCH_SUPPORTED}}" = "true" ]'
        msg: Unsupported macOS architecture {{.GO_DARWIN_UNAME_ARCH}}.
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download Go.
      - sh: command -v installer >/dev/null 2>&1
        msg: The macOS installer command is required to install Go.
      - sh: command -v shasum >/dev/null 2>&1
        msg: shasum is required to verify the Go download.
      - sh: 'test "$(id -u)" -eq 0 || command -v sudo >/dev/null 2>&1'
        msg: sudo is required to install the Go package when not running as root.
    cmds:
      - cmd: |
          # This task only handles an explicitly requested version; Homebrew
          # covers the "latest" path. The guard lives here and not only in
          # status: because `task --force` disables status checks, and a forced
          # run with an empty GO_VERSION would request
          # https://go.dev/dl/.darwin-arm64.pkg, which 404s.
          if [ -z "{{.GO_VERSION}}" ]; then
            exit 0
          fi

          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT INT TERM

          package="{{.GO_VERSION}}.darwin-{{.GO_DARWIN_ARCH}}.pkg"
          echo "Downloading $package..."
          curl -fL "{{.GO_DOWNLOAD_BASE_URL}}/$package" -o "$work_dir/$package"
          curl -fsSL "{{.GO_DOWNLOAD_BASE_URL}}/$package.sha256" -o "$work_dir/$package.sha256"

          expected="$(tr -d '[:space:]' < "$work_dir/$package.sha256")"
          actual="$(shasum -a 256 "$work_dir/$package" | awk '{print $1}')"
          if [ "$expected" != "$actual" ]; then
            echo "Checksum mismatch for $package: expected $expected, got $actual" >&2
            exit 1
          fi

          if [ "$(id -u)" -eq 0 ]; then
            installer -pkg "$work_dir/$package" -target /
          else
            sudo installer -pkg "$work_dir/$package" -target /
          fi
  _install:linux:tarball:
    run: once
    internal: true
    desc: Install Go on Linux using the official tarball
    summary: |
      Download GO_VERSION, defaulting to the latest stable Go Linux tarball,
      replace INSTALL_DIR_UNIX/go, and extract the new toolchain. Requires sudo
      when not running as root.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      GO_UNAME_ARCH:
        sh: uname -m
      GO_LINUX_ARCH: >-
        {{if or (eq .GO_UNAME_ARCH "x86_64") (eq .GO_UNAME_ARCH "amd64")}}amd64 {{- else if or (eq .GO_UNAME_ARCH "aarch64") (eq .GO_UNAME_ARCH "arm64")}}arm64 {{- else if eq .GO_UNAME_ARCH "armv6l"}}armv6l {{- else if or (eq .GO_UNAME_ARCH "i386") (eq .GO_UNAME_ARCH "i686")}}386 {{- else if eq .GO_UNAME_ARCH "ppc64le"}}ppc64le {{- else if eq .GO_UNAME_ARCH "s390x"}}s390x {{- else}}{{.GO_UNAME_ARCH}}{{end}}
      GO_LINUX_ARCH_SUPPORTED: >-
        {{if or (eq .GO_LINUX_ARCH "amd64") (eq .GO_LINUX_ARCH "arm64") (eq .GO_LINUX_ARCH "armv6l") (eq .GO_LINUX_ARCH "386") (eq .GO_LINUX_ARCH "ppc64le") (eq .GO_LINUX_ARCH "s390x")}}true {{- else}}false{{end}}
    status:
      - '[ "{{default "false" .FORCE}}" != "true" ]'
      - >-
        [ -z "{{.GO_VERSION}}" ] || { command -v go >/dev/null 2>&1 && [ "$(go version | awk '{print $3}')" = "{{.GO_VERSION}}" ]; }
      - command -v go >/dev/null 2>&1
    preconditions:
      - sh: 'case "{{.GO_VERSION}}" in ""|go*) exit 0 ;; *) exit 1 ;; esac'
        msg: GO_VERSION must use the official Go release format, for example go1.26.2.
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download Go.
      - sh: command -v tar >/dev/null 2>&1
        msg: tar is required to extract Go.
      - sh: command -v uname >/dev/null 2>&1
        msg: uname is required to detect the system architecture.
      - sh: command -v sha256sum >/dev/null 2>&1 || command -v shasum >/dev/null 2>&1
        msg: sha256sum or shasum is required to verify the Go download.
      - sh: '[ "{{.GO_LINUX_ARCH_SUPPORTED}}" = "true" ]'
        msg: Unsupported Linux architecture {{.GO_UNAME_ARCH}}.
      - sh: 'test "$(id -u)" -eq 0 || command -v sudo >/dev/null 2>&1'
        msg: sudo is required to install Go under INSTALL_DIR_UNIX when not running as root.
    cmds:
      - cmd: |
          # Everything happens in a private temp directory removed by the trap,
          # so an interrupted or failed run leaves neither a partial download nor
          # a predictable /tmp path another user could have pre-created.
          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir" 2>/dev/null || sudo -n rm -rf "$work_dir" 2>/dev/null || true' \
            EXIT INT TERM

          privileged() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo "$@"
            fi
          }

          if [ -n "{{.GO_VERSION}}" ]; then
            archive="{{.GO_VERSION}}.linux-{{.GO_LINUX_ARCH}}.tar.gz"
          else
            archive="$(curl -fsSL "{{.GO_VERSION_URL}}" | sed -n '1p').linux-{{.GO_LINUX_ARCH}}.tar.gz"
          fi

          echo "Downloading $archive..."
          curl -fL "{{.GO_DOWNLOAD_BASE_URL}}/$archive" -o "$work_dir/$archive"
          curl -fsSL "{{.GO_DOWNLOAD_BASE_URL}}/$archive.sha256" -o "$work_dir/$archive.sha256"

          # go.dev serves the bare hex digest, not a checksum-file line.
          expected="$(tr -d '[:space:]' < "$work_dir/$archive.sha256")"
          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "$work_dir/$archive" | awk '{print $1}')"
          else
            actual="$(shasum -a 256 "$work_dir/$archive" | awk '{print $1}')"
          fi
          if [ "$expected" != "$actual" ]; then
            echo "Checksum mismatch for $archive: expected $expected, got $actual" >&2
            exit 1
          fi

          # Extract and smoke-test the new toolchain *before* touching the
          # installed one. The previous flow removed GO_ROOT_UNIX first, so a
          # truncated archive left the machine with no Go at all and no rollback.
          # Extraction is privileged so GO_ROOT_UNIX stays root-owned.
          if [ "$(id -u)" -eq 0 ]; then
            tar -C "$work_dir" -xzf "$work_dir/$archive"
          else
            sudo tar -C "$work_dir" -xzf "$work_dir/$archive"
          fi
          "$work_dir/go/bin/go" version >/dev/null

          echo "Installing Go to {{.GO_ROOT_UNIX}}..."
          privileged rm -rf "{{.GO_ROOT_UNIX}}.old"
          if [ -d "{{.GO_ROOT_UNIX}}" ]; then
            privileged mv "{{.GO_ROOT_UNIX}}" "{{.GO_ROOT_UNIX}}.old"
          fi
          if ! privileged mv "$work_dir/go" "{{.GO_ROOT_UNIX}}"; then
            echo "Install failed; restoring the previous toolchain." >&2
            if [ -d "{{.GO_ROOT_UNIX}}.old" ]; then
              privileged mv "{{.GO_ROOT_UNIX}}.old" "{{.GO_ROOT_UNIX}}"
            fi
            exit 1
          fi
          privileged rm -rf "{{.GO_ROOT_UNIX}}.old"
          echo "Go installed to {{.GO_ROOT_UNIX}}."
  _install:windows:msi:
    run: once
    internal: true
    desc: Install Go on Windows using the official MSI
    summary: |
      Download GO_VERSION, defaulting to the latest stable Go Windows MSI, and
      install it quietly.
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if ('{{default "false" .FORCE}}' -eq 'true') { exit 1 }; $requested = '{{.GO_VERSION}}'; if (Get-Command go -ErrorAction SilentlyContinue) {


          if ([string]::IsNullOrWhiteSpace($requested)
          -or ((& go version).Split()[2] -eq $requested)) { exit 0 }
        }; exit 1"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "$version = '{{.GO_VERSION}}'; if ([string]::IsNullOrWhiteSpace($version) -or $version.StartsWith('go')) { exit 0 } else { exit 1 }"
        msg: GO_VERSION must use the official Go release format, for example go1.26.2.
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if ($env:PROCESSOR_ARCHITECTURE -eq 'AMD64' -or $env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { exit 0 } else { exit 1 }"
        msg: Go MSI install supports AMD64 and ARM64 Windows architectures.
    cmds:
      # Resolve the version, pick the architecture, download, verify and install
      # in one PowerShell session. Splitting these across commands previously
      # required staging the version in a shared TEMP file and duplicating the
      # download for AMD64 and ARM64.
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $version = '{{.GO_VERSION}}'; if ([string]::IsNullOrWhiteSpace($version)) {


          $version = ((Invoke-RestMethod -Uri '{{.GO_VERSION_URL}}') -split \"`n\")[0].Trim()
        }; $arch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'amd64' }; $package = \"$version.windows-$arch.msi\"; $workDir = Join-Path $env:TEMP ('taskotter-go-' + [Guid]::NewGuid().ToString('N')); New-Item -ItemType Directory -Path $workDir | Out-Null; try {


          $installer = Join-Path $workDir $package;
          Write-Host \"Downloading $package...\";
          Invoke-WebRequest -Uri \"{{.GO_DOWNLOAD_BASE_URL}}/$package\" -OutFile $installer;
          $expected = (Invoke-RestMethod
            -Uri \"{{.GO_DOWNLOAD_BASE_URL}}/$package.sha256\").Trim();
          $actual = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash;
          if ($expected -ne $actual) {
            Write-Error \"Checksum mismatch for $package: expected $expected, got $actual\";
          };
          Start-Process msiexec.exe -Wait
            -ArgumentList @('/i', $installer, '/quiet', '/norestart');
        } finally {


          Remove-Item -LiteralPath $workDir -Recurse -Force -ErrorAction SilentlyContinue;
        }"
  _install:undo:macos:
    run: once
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '! command -v go >/dev/null 2>&1 && ! test -d "{{.GO_ROOT_UNIX}}"'
    cmds:
      - |
        if command -v brew >/dev/null 2>&1 && brew list go >/dev/null 2>&1; then
          echo 'Removing Go via Homebrew...'
          brew uninstall go
        elif [ -d "{{.GO_ROOT_UNIX}}" ]; then
          echo 'Removing Go from {{.GO_ROOT_UNIX}}...'
          rm -rf "{{.GO_ROOT_UNIX}}"
        fi
      - echo 'Go removed.'
  _install:undo:linux:
    run: once
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - '! test -d "{{.GO_ROOT_UNIX}}"'
    preconditions:
      - sh: 'test "$(id -u)" -eq 0 || command -v sudo >/dev/null 2>&1'
        msg: sudo is required to remove Go under INSTALL_DIR_UNIX when not running as root.
    cmds:
      - echo 'Removing Go from {{.GO_ROOT_UNIX}}...'
      - cmd: rm -rf "{{.GO_ROOT_UNIX}}"
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo rm -rf "{{.GO_ROOT_UNIX}}"
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'Go removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command go -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing Go...
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$pkg = Get-Package -Name 'Go Programming Language*' -ErrorAction SilentlyContinue; if ($pkg) { $pkg | Uninstall-Package -Force } else { Write-Warning 'Go package not found via Get-Package. Remove it manually from Apps & Features.' }"
      - echo Go removed. Restart your terminal.
  _shell:setup:linux:
    run: once
    internal: true
    desc: Configure Go PATH on Linux
    summary: Add GO_BIN_UNIX to the current user's shell profile if it is not already available.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - '[ "{{default "false" .FORCE}}" != "true" ] && command -v go >/dev/null 2>&1'
    cmds:
      - task: _shell:setup:linux:profile
        vars:
          FORCE: "{{.FORCE}}"
          GO_PROFILE: "$HOME/.zshrc"
        if: '[ "$(basename "${SHELL:-}")" = "zsh" ]'
      - task: _shell:setup:linux:profile
        vars:
          FORCE: "{{.FORCE}}"
          GO_PROFILE: "$HOME/.bashrc"
        if: '[ "$(basename "${SHELL:-}")" = "bash" ]'
      - task: _shell:setup:linux:profile
        vars:
          FORCE: "{{.FORCE}}"
          GO_PROFILE: "$HOME/.profile"
        if: '[ "$(basename "${SHELL:-}")" != "zsh" ] && [ "$(basename "${SHELL:-}")" != "bash" ]'
  _shell:setup:linux:profile:
    run: once
    internal: true
    desc: Configure Go PATH in a Linux shell profile
    summary: Add GO_BIN_UNIX to the selected Linux shell profile if it is not already available.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    requires:
      vars:
        - GO_PROFILE
    status:
      - >-
        [ "{{default "false" .FORCE}}" != "true" ] && command -v go >/dev/null 2>&1 || grep -qF "{{.GO_BIN_UNIX}}" "{{.GO_PROFILE}}" 2>/dev/null
    cmds:
      # The header and the export are appended by a single guarded block. As two
      # separately guarded commands, an interrupt between them left a "# Go"
      # header with no export, and the second guard then saw the marker and
      # skipped forever.
      - cmd: |
          touch "{{.GO_PROFILE}}"
          if ! grep -qF "{{.GO_BIN_UNIX}}" "{{.GO_PROFILE}}" 2>/dev/null; then
            printf '\n# Go\nexport PATH="$PATH:{{.GO_BIN_UNIX}}"\n' >> "{{.GO_PROFILE}}"
          fi
      - echo "Go PATH added to {{.GO_PROFILE}}. Restart your shell or run export PATH=\"\$PATH:{{.GO_BIN_UNIX}}\"."
  _version:unix:
    run: once
    internal: true
    desc: Show Go version on macOS or Linux
    summary: Print `go version` on macOS or Linux.
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v go >/dev/null 2>&1 || test -x "{{.GO_CMD_UNIX}}"
        msg: Go is not installed or not available in PATH.
    cmds:
      # An explicit GO_VERSION pins the toolchain under GO_ROOT_UNIX; otherwise
      # prefer whatever PATH resolves, falling back to GO_ROOT_UNIX.
      - cmd: |
          if [ -n "{{.GO_VERSION}}" ] && [ -x "{{.GO_CMD_UNIX}}" ]; then
            "{{.GO_CMD_UNIX}}" version
          elif command -v go >/dev/null 2>&1; then
            go version
          else
            "{{.GO_CMD_UNIX}}" version
          fi
  _version:windows:
    run: once
    internal: true
    desc: Show Go version on Windows
    summary: Print `go version` on Windows.
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command go -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Go is not installed or not available in PATH.
    cmds:
      - go version
  _which:unix:
    run: once
    internal: true
    desc: Show Go binary path on macOS or Linux
    summary: Print the Go binary path resolved by the current PATH on macOS or Linux.
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v go >/dev/null 2>&1 || test -x "{{.GO_CMD_UNIX}}"
        msg: Go is not installed or not available in PATH.
    cmds:
      - cmd: |
          if [ -n "{{.GO_VERSION}}" ] && [ -x "{{.GO_CMD_UNIX}}" ]; then
            printf '%s\n' '{{.GO_CMD_UNIX}}'
          elif command -v go >/dev/null 2>&1; then
            command -v go
          else
            printf '%s\n' '{{.GO_CMD_UNIX}}'
          fi
  _which:windows:
    run: once
    internal: true
    desc: Show Go binary path on Windows
    summary: Print the Go binary path resolved by PowerShell on Windows.
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command go -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Go is not installed or not available in PATH.
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "(Get-Command go).Source"
  _verify:unix:
    run: once
    internal: true
    desc: Verify Go on macOS or Linux
    summary: Print Go version, GOROOT, and GOPATH on macOS or Linux.
    platforms: [linux, darwin]
    preconditions:
      - sh: command -v go >/dev/null 2>&1 || test -x "{{.GO_CMD_UNIX}}"
        msg: Go is not installed or not available in PATH.
    cmds:
      - cmd: |
          if [ -n "{{.GO_VERSION}}" ] && [ -x "{{.GO_CMD_UNIX}}" ]; then
            go_cmd='{{.GO_CMD_UNIX}}'
          elif command -v go >/dev/null 2>&1; then
            go_cmd=go
          else
            go_cmd='{{.GO_CMD_UNIX}}'
          fi
          "$go_cmd" version
          "$go_cmd" env GOROOT GOPATH
  _verify:windows:
    run: once
    internal: true
    desc: Verify Go on Windows
    summary: Print Go version, GOROOT, and GOPATH on Windows.
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command go -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Go is not installed or not available in PATH.
    cmds:
      - go version
      - go env GOROOT GOPATH

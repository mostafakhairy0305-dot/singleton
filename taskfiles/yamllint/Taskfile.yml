---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
includes:
  uv:
    taskfile: ../uv/Taskfile.yml
  skipfiles:
    taskfile: ../internal/skipfiles/Taskfile.yml
    internal: true
vars:
  YAMLLINT_LINT_SKIP_PATTERN: ""
  UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
  TARGETS: "."
  CONFIG: ""
  EXTRA_ARGS: ""
  YAMLLINT_VERSION: ""
  YAMLFIX_VERSION: ""
tasks:
  default:
    run: once
    desc: Show available yamllint automation tasks
    summary: Display the list of available yamllint-related tasks defined in this Taskfile.
    cmds:
      - task --list
  install:
    run: once
    desc: Install yamllint on the current operating system
    summary: |
      Install yamllint via uv tool install for the current platform.
      Pass YAMLLINT_VERSION to pin a specific release instead of the latest.
      uv manages an isolated environment so yamllint never conflicts with
      project dependencies. Installs uv first if it is not already present.
    cmds:
      - task: _install:unix
      - task: _install:windows
  install:undo:
    run: once
    desc: Remove yamllint from the current operating system
    summary: |
      Remove yamllint via uv tool uninstall on all platforms.
      The uv-managed isolated environment is cleaned up automatically.
    aliases:
      - uninstall
    prompt:
      - This will remove yamllint from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows
  upgrade:
    run: once
    desc: Upgrade yamllint to the latest release
    summary: |
      Upgrade yamllint via uv tool upgrade on all platforms.
      Auto-installs yamllint if missing.
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows
  version:
    run: once
    desc: Show the installed yamllint version
    summary: Print the active yamllint version via yamllint --version. Auto-installs yamllint if missing.
    deps:
      - install
    cmds:
      - bash -lc '{{.UV_LOAD}}; yamllint --version'
  lint:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Lint YAML files with yamllint (TARGETS=path)
    summary: |
      Run yamllint against TARGETS (default .). Pass CONFIG to use a custom
      config file via -c, and EXTRA_ARGS for additional flags.
      Auto-installs yamllint if missing.
    deps:
      - install
    vars:
      TARGETS: "."
      CONFIG: ""
      EXTRA_ARGS: ""
    cmds:
      - >-
        bash -lc '{{.UV_LOAD}}; _skip="{{if .YAMLLINT_LINT_SKIP_PATTERN_OVERRIDE}}{{.YAMLLINT_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.YAMLLINT_LINT_SKIP_PATTERN}}{{end}}"; if [ -z "$_skip" ]; then yamllint {{if .CONFIG_OVERRIDE}}-c "{{.CONFIG_OVERRIDE}}" {{else if .CONFIG}}-c "{{.CONFIG}}" {{end}} {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}} {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}} {{- else}}{{.EXTRA_ARGS}}{{end}}; else _files="$(mktemp)"; trap '"'"'rm -f "$_files"'"'"' EXIT; for _target in {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}; do if [ -d "$_target" ]; then find "$_target" -type f \( -name "*.yml" -o -name "*.yaml" \) -print0; elif [ -f "$_target" ]; then printf "%s\000" "$_target"; fi; done | task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" filter "SKIPFILES_PATTERN=$_skip" >"$_files"; if [ -s "$_files" ]; then xargs -0 yamllint {{if .CONFIG_OVERRIDE}}-c "{{.CONFIG_OVERRIDE}}" {{else if .CONFIG}}-c "{{.CONFIG}}" {{end}} {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}} <"$_files"; else echo "No matching YAML files found"; fi; fi && echo "✅ yamllint passed" || { echo "❌ yamllint failed"; exit 1; }'
  lint:fix:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Auto-fix YAML files with yamlfix (TARGETS=path)
    summary: |
      Run yamlfix against YAML files found under TARGETS (default .). Excludes
      Taskfile.yml files whose Go template syntax is incompatible with yamlfix.
      Pass EXTRA_ARGS for additional flags. Auto-installs yamlfix if missing.
    deps:
      - install
      - _install:yamlfix:unix
      - _install:yamlfix:windows
    vars:
      TARGETS: "."
      EXTRA_ARGS: ""
    cmds:
      - >-
        bash -lc '{{.UV_LOAD}}; _t="{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}"; [ -d "$_t" ] || _t="."; find "$_t" \( -name "*.yml" -o -name "*.yaml" \) ! -name "Taskfile.yml" ! -name "Taskfile.yaml" -print0 | xargs -0 yamlfix {{if .YAMLLINT_LINT_SKIP_PATTERN_OVERRIDE}}--exclude "{{.YAMLLINT_LINT_SKIP_PATTERN_OVERRIDE}}" {{else if .YAMLLINT_LINT_SKIP_PATTERN}}--exclude "{{.YAMLLINT_LINT_SKIP_PATTERN}}" {{end}} {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}'
  ci:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Lint YAML files in strict mode for CI (TARGETS=path)
    summary: |
      Run yamllint --strict against TARGETS. Exits non-zero on warnings as
      well as errors, making it suitable for continuous integration pipelines.
      Auto-installs yamllint if missing.
    deps:
      - install
    vars:
      TARGETS: "."
      CONFIG: ""
      EXTRA_ARGS: ""
    cmds:
      - >-
        bash -lc '{{.UV_LOAD}}; _skip="{{if .YAMLLINT_LINT_SKIP_PATTERN_OVERRIDE}}{{.YAMLLINT_LINT_SKIP_PATTERN_OVERRIDE}} {{- else}}{{.YAMLLINT_LINT_SKIP_PATTERN}}{{end}}"; if [ -z "$_skip" ]; then yamllint --strict {{if .CONFIG_OVERRIDE}}-c "{{.CONFIG_OVERRIDE}}" {{else if .CONFIG}}-c "{{.CONFIG}}" {{end}} {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}} {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}} {{- else}}{{.EXTRA_ARGS}}{{end}}; else _files="$(mktemp)"; trap '"'"'rm -f "$_files"'"'"' EXIT; for _target in {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}; do if [ -d "$_target" ]; then find "$_target" -type f \( -name "*.yml" -o -name "*.yaml" \) -print0; elif [ -f "$_target" ]; then printf "%s\000" "$_target"; fi; done | task --silent --taskfile "{{.TASKFILE_DIR}}/../internal/skipfiles/Taskfile.yml" filter "SKIPFILES_PATTERN=$_skip" >"$_files"; if [ -s "$_files" ]; then xargs -0 yamllint --strict {{if .CONFIG_OVERRIDE}}-c "{{.CONFIG_OVERRIDE}}" {{else if .CONFIG}}-c "{{.CONFIG}}" {{end}} {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}} <"$_files"; else echo "No matching YAML files found"; fi; fi && echo "✅ yamllint passed" || { echo "❌ yamllint failed"; exit 1; }'
  config:init:
    run: once
    dir: "{{.USER_WORKING_DIR}}"
    desc: Create a default .yamllint configuration file
    summary: |
      Write a sensible default .yamllint file in the current directory.
      Extends yamllint defaults with a relaxed line-length limit and explicit
      truthy values. Skipped if .yamllint already exists.
    status:
      - test -f .yamllint
    cmds:
      - "printf 'extends: default\\n' > .yamllint"
      - "printf 'rules:\\n' >> .yamllint"
      - "printf '  line-length:\\n' >> .yamllint"
      - "printf '    max: 120\\n' >> .yamllint"
      - "printf '  truthy:\\n' >> .yamllint"
      - "printf \"    allowed-values: ['true', 'false']\\n\" >> .yamllint"
      - echo 'Created .yamllint with default configuration.'
  _install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        bash -lc '{{.UV_LOAD}}; command -v yamllint >/dev/null 2>&1 && { [ -z "{{.YAMLLINT_VERSION}}" ] || yamllint --version | grep -Fq "{{.YAMLLINT_VERSION}}"; }'
    deps:
      - uv:install
    cmds:
      - echo 'Installing yamllint via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"'
      - echo 'yamllint installed.'
  _install:yamlfix:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        bash -lc '{{.UV_LOAD}}; command -v yamlfix >/dev/null 2>&1 && { [ -z "{{.YAMLFIX_VERSION}}" ] || yamlfix --version | grep -Fq "{{.YAMLFIX_VERSION}}"; }'
    deps:
      - uv:install
    cmds:
      - echo 'Installing yamlfix via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force "yamlfix{{if .YAMLFIX_VERSION}}=={{.YAMLFIX_VERSION}}{{end}}"'
      - echo 'yamlfix installed.'
  _install:yamlfix:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$yamlfix = Get-Command yamlfix -ErrorAction SilentlyContinue; if (-not $yamlfix) { exit 1 }; $requested = '{{.YAMLFIX_VERSION}}'; if ([string]::IsNullOrWhiteSpace($requested) -or ((& $yamlfix.Source --version) -like ('*' + $requested + '*'))) { exit 0 }; exit 1"
    deps:
      - uv:install
    cmds:
      - echo Installing yamlfix via uv...
      - uv tool install --force "yamlfix{{if .YAMLFIX_VERSION}}=={{.YAMLFIX_VERSION}}{{end}}"
      - echo yamlfix installed.
  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$yamllint = Get-Command yamllint -ErrorAction SilentlyContinue; if (-not $yamllint) { exit 1 }; $requested = '{{.YAMLLINT_VERSION}}'; if ([string]::IsNullOrWhiteSpace($requested) -or ((& $yamllint.Source --version) -like ('*' + $requested + '*'))) { exit 0 }; exit 1"
    deps:
      - uv:install
    cmds:
      - echo Installing yamllint via uv...
      - uv tool install --force "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"
      - echo yamllint installed.
  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - bash -lc '{{.UV_LOAD}}; ! command -v yamllint >/dev/null 2>&1'
    cmds:
      - echo 'Removing yamllint...'
      - bash -lc '{{.UV_LOAD}}; uv tool uninstall yamllint'
      - echo 'yamllint removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command yamllint -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing yamllint via uv...
      - uv tool uninstall yamllint
      - echo yamllint removed.
  _upgrade:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: bash -lc '{{.UV_LOAD}}; command -v yamllint >/dev/null 2>&1'
        msg: yamllint is not installed. Run task install first.
    cmds:
      - echo 'Upgrading yamllint via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"'
      - echo 'yamllint upgraded.'
  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command yamllint -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: yamllint is not installed. Run task install first.
    cmds:
      - echo Upgrading yamllint via uv...
      - uv tool install --force "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"
      - echo yamllint upgraded.

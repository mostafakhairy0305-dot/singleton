---
version: "3"
output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false
silent: true
vars:
  UV_INSTALL_URL: https://astral.sh/uv/install.sh
  UV_INSTALL_URL_WINDOWS: https://astral.sh/uv/install.ps1
  UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
  VENV: ".venv"
  REQUIREMENTS: "requirements.txt"
  FILE: ""
  ARGS: ""
  EXTRA_ARGS: ""
  PYTHON_VERSION: ""
  TOOL: ""
  UV_VERSION: ""
tasks:
  default:
    run: once
    desc: Show available uv automation tasks
    summary: Display the list of available uv-related tasks defined in this Taskfile.
    cmds:
      - task --list
  install:
    run: once
    desc: Install uv on the current operating system
    summary: |
      Install uv for the current platform if it is not already available.
      macOS and Linux use the official install script from astral.sh.
      Windows uses the official PowerShell installer from astral.sh.
      Pass UV_VERSION=x.y.z to pin a specific release instead of the latest.
      After installation, restart your shell or the uv binary will be loaded
      automatically via UV_LOAD in subsequent task invocations.
    cmds:
      - task: _install:unix
      - task: _install:windows
  install:undo:
    run: once
    desc: Remove uv from the current operating system
    summary: |
      Remove uv via uv self uninstall on all platforms.
      This removes the uv binary and cleans up the installation directory.
    aliases:
      - uninstall
    prompt:
      - This will remove uv from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows
  upgrade:
    run: once
    desc: Upgrade uv to the latest release
    summary: Run uv self update to upgrade the uv binary to the latest release. Auto-installs uv if missing.
    deps:
      - install
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows
  version:
    run: once
    desc: Show the installed uv version
    summary: Print the active uv version via uv --version. Auto-installs uv if missing.
    deps:
      - install
    cmds:
      - task: _version:unix
      - task: _version:windows
  python:install:
    run: once
    desc: Install a Python version with uv (PYTHON_VERSION=3.x)
    summary: |
      Install the specified Python version via uv python install.
      Pass PYTHON_VERSION to select the version, e.g. PYTHON_VERSION=3.12.
      Auto-installs uv if missing.
    deps:
      - install
    requires:
      vars:
        - PYTHON_VERSION
    preconditions:
      - sh: test -n "{{.PYTHON_VERSION_OVERRIDE}}{{.PYTHON_VERSION}}"
        msg: PYTHON_VERSION is required. Pass PYTHON_VERSION=3.12 when running this task.
    cmds:
      - task: _uv:unix
        vars:
          ARGS: >-
            python install {{if .PYTHON_VERSION_OVERRIDE}}{{.PYTHON_VERSION_OVERRIDE}} {{- else}}{{.PYTHON_VERSION}}{{end}}
      - task: _uv:windows
        vars:
          ARGS: >-
            python install {{if .PYTHON_VERSION_OVERRIDE}}{{.PYTHON_VERSION_OVERRIDE}} {{- else}}{{.PYTHON_VERSION}}{{end}}
  venv:
    run: once
    desc: Create a Python virtual environment with uv (VENV=path)
    summary: |
      Create a virtual environment at VENV (default .venv) using uv venv.
      Auto-installs uv if missing.
    deps:
      - install
    cmds:
      - task: _uv:unix
        vars:
          ARGS: 'venv "{{.VENV}}" {{.EXTRA_ARGS}}'
      - task: _uv:windows
        vars:
          ARGS: 'venv "{{.VENV}}" {{.EXTRA_ARGS}}'
  pip:install:
    run: once
    desc: Install packages from a requirements file with uv (REQUIREMENTS=path)
    summary: |
      Run uv pip install -r REQUIREMENTS (default requirements.txt).
      Pass EXTRA_ARGS for additional flags such as --upgrade or --no-cache.
      Auto-installs uv if missing.
    deps:
      - install
    cmds:
      - task: _uv:unix
        vars:
          ARGS: 'pip install -r "{{.REQUIREMENTS}}" {{.EXTRA_ARGS}}'
      - task: _uv:windows
        vars:
          ARGS: 'pip install -r "{{.REQUIREMENTS}}" {{.EXTRA_ARGS}}'
  run:
    run: once
    desc: Run a script or command with uv (FILE=path)
    summary: |
      Execute FILE via uv run, which automatically manages the virtual environment.
      Pass ARGS for positional arguments and EXTRA_ARGS for uv flags.
      Auto-installs uv if missing.
    deps:
      - install
    requires:
      vars:
        - FILE
    preconditions:
      - sh: test -n "{{.FILE_OVERRIDE}}{{.FILE}}"
        msg: FILE is required. Pass FILE=path/to/script.py when running this task.
    cmds:
      - task: _uv:unix
        vars:
          ARGS: >-
            run "{{if .FILE_OVERRIDE}}{{.FILE_OVERRIDE}}{{else}}{{.FILE}}{{end}}" {{.ARGS}} {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
      - task: _uv:windows
        vars:
          ARGS: >-
            run "{{if .FILE_OVERRIDE}}{{.FILE_OVERRIDE}}{{else}}{{.FILE}}{{end}}" {{.ARGS}} {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
  tool:install:
    run: once
    desc: Install a tool into an isolated environment with uv (TOOL=name)
    summary: |
      Run uv tool install TOOL to install a Python tool (e.g. yamllint, ruff)
      into an isolated environment with its shim added to PATH.
      Pass EXTRA_ARGS for additional flags such as --upgrade.
      Auto-installs uv if missing.
    deps:
      - install
    requires:
      vars:
        - TOOL
    preconditions:
      - sh: test -n "{{.TOOL_OVERRIDE}}{{.TOOL}}"
        msg: TOOL is required. Pass TOOL=name when running this task.
    cmds:
      - task: _uv:unix
        vars:
          ARGS: >-
            tool install "{{if .TOOL_OVERRIDE}}{{.TOOL_OVERRIDE}}{{else}}{{.TOOL}}{{end}}" {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
      - task: _uv:windows
        vars:
          ARGS: >-
            tool install "{{if .TOOL_OVERRIDE}}{{.TOOL_OVERRIDE}}{{else}}{{.TOOL}}{{end}}" {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
  tool:upgrade:
    run: once
    desc: Upgrade an installed uv tool (TOOL=name)
    summary: |
      Run uv tool upgrade TOOL to upgrade a previously installed tool to its
      latest release. Pass EXTRA_ARGS for additional flags.
      Auto-installs uv if missing.
    deps:
      - install
    requires:
      vars:
        - TOOL
    preconditions:
      - sh: test -n "{{.TOOL_OVERRIDE}}{{.TOOL}}"
        msg: TOOL is required. Pass TOOL=name when running this task.
    cmds:
      - task: _uv:unix
        vars:
          ARGS: >-
            tool upgrade "{{if .TOOL_OVERRIDE}}{{.TOOL_OVERRIDE}}{{else}}{{.TOOL}}{{end}}" {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
      - task: _uv:windows
        vars:
          ARGS: >-
            tool upgrade "{{if .TOOL_OVERRIDE}}{{.TOOL_OVERRIDE}}{{else}}{{.TOOL}}{{end}}" {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
  _uv:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    requires:
      vars: [ARGS]
    cmds:
      - bash -lc '{{.UV_LOAD}}; uv {{.ARGS}}'
  _uv:windows:
    run: once
    internal: true
    platforms: [windows]
    requires:
      vars: [ARGS]
    cmds:
      - uv {{.ARGS}}
  _install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        uv_bin="$HOME/.local/bin/uv"; if [ ! -x "$uv_bin" ]; then uv_bin="$(command -v uv 2>/dev/null)"; fi; [ -n "$uv_bin" ] && [ -x "$uv_bin" ] && { [ -z "{{.UV_VERSION}}" ] || "$uv_bin" --version | grep -Fqx "uv {{.UV_VERSION}}"; }
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download the uv installer.
    cmds:
      - echo 'Installing uv via the official install script...'
      - >-
        curl -LsSf "{{if .UV_VERSION}}https://astral.sh/uv/{{.UV_VERSION}}/install.sh{{else}}{{.UV_INSTALL_URL}}{{end}}" | sh
      - echo 'uv installed. Restart your shell or tasks will use UV_LOAD to locate the binary.'
  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "$uv = Get-Command uv -ErrorAction SilentlyContinue; if (-not $uv) { exit 1 }; $requested = '{{.UV_VERSION}}'; if ([string]::IsNullOrWhiteSpace($requested) -or ((& $uv.Source --version) -eq ('uv ' + $requested))) { exit 0 }; exit 1"
    cmds:
      - echo Installing uv via the official PowerShell installer...
      - >-
        powershell -ExecutionPolicy ByPass -c "$installer = if ('{{.UV_VERSION}}') { 'https://astral.sh/uv/' + '{{.UV_VERSION}}' + '/install.ps1' } else { '{{.UV_INSTALL_URL_WINDOWS}}' }; irm $installer | iex"
      - echo uv installed. Restart your terminal to use uv.
  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '! test -f "$HOME/.local/bin/uv" && ! command -v uv >/dev/null 2>&1'
    cmds:
      - echo 'Removing uv...'
      - bash -lc '{{.UV_LOAD}}; uv self uninstall'
      - echo 'uv removed.'
  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command uv -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing uv...
      - uv self uninstall
      - echo uv removed. Restart your terminal.
  _upgrade:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: 'test -f "$HOME/.local/bin/uv" || command -v uv >/dev/null 2>&1'
        msg: uv is not installed. Run task install first.
    cmds:
      - echo 'Upgrading uv...'
      - bash -lc '{{.UV_LOAD}}; uv self update'
      - echo 'uv upgraded.'
  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command uv -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: uv is not installed. Run task install first.
    cmds:
      - echo Upgrading uv...
      - uv self update
      - echo uv upgraded.
  _version:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: 'test -f "$HOME/.local/bin/uv" || command -v uv >/dev/null 2>&1'
        msg: uv is not installed. Run task install first.
    cmds:
      - bash -lc '{{.UV_LOAD}}; uv --version'
  _version:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command "if (Get-Command uv -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: uv is not installed. Run task install first.
    cmds:
      - uv --version

---
name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions: {}
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  taskotter:
    name: Sync TaskOtter taskfiles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Sync TaskOtter taskfiles
        uses: ./.github/actions/taskotter
        with:
          token: ${{ github.token }}
  ci:
    name: Run CI Checks
    runs-on: ubuntu-latest
    needs: taskotter
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false
      - name: Lint
        uses: ./.github/actions/ci

---
name: Sync TaskOtter Taskfiles
on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
concurrency:
  group: taskotter-sync
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Sync TaskOtter taskfiles
        uses: ./.github/actions/taskotter
        with:
          token: ${{ github.token }}
